<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>请求书业务审核</title>
<style>
body{font-family:Arial,"Microsoft YaHei",sans-serif;margin:0;background:#f6f7f9;color:#222}
header{background:#1f4e78;color:#fff;padding:18px 24px}
main{padding:20px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
input,select,button,textarea{padding:8px;border:1px solid #bbb;border-radius:4px}
button{cursor:pointer}
.primary{background:#1f4e78;color:#fff}
.danger{background:#a61b1b;color:#fff}
.warn{background:#9a6700;color:#fff}
.ok{background:#1f7a3f;color:#fff}
.card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:16px;margin-bottom:18px}
table{border-collapse:collapse;width:100%;font-size:14px}
th,td{border:1px solid #ddd;padding:8px;text-align:left;vertical-align:top}
th{background:#eef3f8}
.status{font-weight:bold}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.small{font-size:12px;color:#666}
.actions{display:flex;gap:6px;flex-wrap:wrap}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<!-- BUILD037_REQUEST_TAX_BREAKDOWN_R1 -->
<header>
  <h1>请求书业务审核</h1>
  <div>文件核对通过 → 业务内容审核 → 审核通过后自动登记正式销售台账</div>
</header>

<main><section class="card"><strong>业务审核范围：</strong>确认请求金额、重复、取消、现收／无需请求书等业务内容。只有“业务审核通过”自动登记正式销售台账。</section>
<div class="grid">
<section class="card">
<h2>待业务审核请求书</h2>
<div class="toolbar">
  <select id="reviewStatus">
    <option value="PENDING_REVIEW">PENDING_REVIEW</option>
    <option value="APPROVED">APPROVED</option>
    <option value="REJECTED">REJECTED</option>
    <option value="CANCELLED">CANCELLED</option>
    <option value="DUPLICATE">DUPLICATE</option>
    <option value="">全部</option>
  </select>
  <input id="reviewer" placeholder="审核人" value="web-reviewer">
  <input id="note" placeholder="审核备注">
  <button class="primary" onclick="loadPending()">刷新</button>
</div>
<div id="pendingMessage" class="small"></div>
<div style="overflow:auto">
<table>
<thead>
<tr>
<th>请求书编号</th><th>客户</th><th>日期</th><th>10%对象</th><th>10%税</th><th>8%对象</th><th>8%税</th><th>非课税</th><th>免税</th><th>请求总额</th><th>状态</th><th>操作</th>
</tr>
</thead>
<tbody id="pendingBody"></tbody>
</table>
</div>
</section>

<section class="card">
<h2>正式销售台账（业务审核通过后自动登记）</h2>
<div class="toolbar">
  <input id="salesCustomerId" placeholder="Customer ID">
  <input id="salesCustomerName" placeholder="Customer Name">
  <input id="salesRequestNo" placeholder="Request No">
  <button class="primary" onclick="loadSales()">检索</button>
</div>
<div id="salesMessage" class="small"></div>
<div style="overflow:auto">
<table>
<thead>
<tr>
<th>请求书编号</th><th>客户</th><th>日期</th><th>币种</th><th>10%对象</th><th>10%税</th><th>8%对象</th><th>8%税</th><th>非课税</th><th>免税</th><th>总金额</th><th>审核人</th><th>状态</th>
</tr>
</thead>
<tbody id="salesBody"></tbody>
</table>
</div>
</section>
</div>
</main>

<script>
async function api(url, options){
  const response = await fetch(url, options);
  let body = null;
  try { body = await response.json(); } catch(e) { body = await response.text(); }
  if(!response.ok){
    const detail = body && body.detail ? body.detail : String(body);
    throw new Error(detail);
  }
  return body;
}

function esc(v){
  return String(v ?? "").replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

async function loadPending(){
  const status = document.getElementById("reviewStatus").value;
  const qs = new URLSearchParams();
  if(status) qs.set("status", status);
  qs.set("limit","500");
  const rows = await api("/api/requests/pending-review?"+qs.toString());
  const body = document.getElementById("pendingBody");
  body.innerHTML = "";
  rows.forEach(row => {
    const canResolve = row.status === "PENDING_REVIEW";
    const actions = [];
    if(canResolve){
      actions.push(`<button class="ok" onclick="resolveRecord('${esc(row.id)}','APPROVE')">业务审核通过</button>`);
      actions.push(`<button class="danger" onclick="resolveRecord('${esc(row.id)}','REJECT')">驳回</button>`);
      actions.push(`<button class="warn" onclick="resolveRecord('${esc(row.id)}','CANCEL')">已取消</button>`);
      actions.push(`<button onclick="resolveRecord('${esc(row.id)}','MARK_DUPLICATE')">重复请求书</button>`);
      actions.push(`<button onclick="resolveRecord('${esc(row.id)}','MARK_CASH_SALE_NO_INVOICE')">现收／无需请求书</button>`);
      actions.push(`<button onclick="resolveRecord('${esc(row.id)}','REQUIRE_AMOUNT_CORRECTION')">金额需修正</button>`);
      actions.push(`<button onclick="resolveRecord('${esc(row.id)}','REQUIRE_BUSINESS_CORRECTION')">业务内容需修正</button>`);
      actions.push(`<button class="warn" onclick="resolveRecord('${esc(row.id)}','HOLD')">暂缓处理</button>`);
    }
    if(row.sales_ledger_id){
      actions.push(`<span class="small">已入台账</span>`);
    }
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${esc(row.request_no)}</td>
      <td>${esc(row.customer_id)}<br>${esc(row.customer_name)}</td>
      <td>${esc(row.request_date)}</td>
      <td>${esc(row.taxable_amount_10)}</td>
      <td>${esc(row.tax_amount_10)}</td>
      <td>${esc(row.taxable_amount_8)}</td>
      <td>${esc(row.tax_amount_8)}</td>
      <td>${esc(row.non_taxable_amount)}</td>
      <td>${esc(row.tax_exempt_amount)}</td>
      <td>${esc(row.currency)} ${esc(row.total_amount)}</td>
      <td class="status">${esc(row.status)}</td>
      <td><div class="actions">${actions.join("")}</div></td>`;
    body.appendChild(tr);
  });
  document.getElementById("pendingMessage").textContent = `${rows.length} records`;
}

async function resolveRecord(id, action){
  const reviewed_by = document.getElementById("reviewer").value.trim();
  const note = document.getElementById("note").value.trim();
  if(!reviewed_by){ alert("请输入审核人"); return; }
  try{
    await api(`/api/requests/pending-review/${id}/resolve`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action, reviewed_by, note})
    });
    await loadPending();
  }catch(e){ alert(e.message); }
}


async function loadSales(){
  const qs = new URLSearchParams();
  const customerId = document.getElementById("salesCustomerId").value.trim();
  const customerName = document.getElementById("salesCustomerName").value.trim();
  const requestNo = document.getElementById("salesRequestNo").value.trim();
  if(customerId) qs.set("customer_id", customerId);
  if(customerName) qs.set("customer_name", customerName);
  if(requestNo) qs.set("request_no", requestNo);
  qs.set("limit","500");
  const rows = await api("/api/sales-ledger?"+qs.toString());
  const body = document.getElementById("salesBody");
  body.innerHTML = "";
  rows.forEach(row => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${esc(row.request_no)}</td>
      <td>${esc(row.customer_id)}<br>${esc(row.customer_name)}</td>
      <td>${esc(row.request_date)}</td>
      <td>${esc(row.currency)}</td>
      <td>${esc(row.taxable_amount_10)}</td>
      <td>${esc(row.tax_amount_10)}</td>
      <td>${esc(row.taxable_amount_8)}</td>
      <td>${esc(row.tax_amount_8)}</td>
      <td>${esc(row.non_taxable_amount)}</td>
      <td>${esc(row.tax_exempt_amount)}</td>
      <td>${esc(row.total_amount)}</td>
      <td>${esc(row.reviewed_by)}</td>
      <td class="status">${esc(row.status)}</td>`;
    body.appendChild(tr);
  });
  document.getElementById("salesMessage").textContent = `${rows.length} records`;
}

Promise.all([loadPending(), loadSales()]).catch(e => {
  document.getElementById("pendingMessage").textContent = e.message;
});
</script>
<script>
/* TLC_TABLE_ROW_SELECTOR_V1 */
(function(){
  const NUMBER_CLASS="tlc-row-no";
  const CHECK_CLASS="tlc-row-check";
  let scheduled=false;

  function headerRows(table){
    const explicit=[...table.querySelectorAll("thead tr")];
    if(explicit.length) return explicit;
    const first=[...table.querySelectorAll("tr")].find(row=>row.querySelector("th"));
    return first?[first]:[];
  }

  function dataRows(table,headers){
    const headerSet=new Set(headers);
    return [...table.querySelectorAll("tr")].filter(row=>{
      if(headerSet.has(row)) return false;
      if(row.querySelector("th") && !row.querySelector("td")) return false;
      return true;
    });
  }

  function addHeader(row){
    if(row.querySelector("."+NUMBER_CLASS)) return;

    const checkTh=document.createElement("th");
    checkTh.className=CHECK_CLASS;
    checkTh.style.width="38px";
    checkTh.style.textAlign="center";

    const all=document.createElement("input");
    all.type="checkbox";
    all.title="全选/取消全选";
    all.addEventListener("click",event=>event.stopPropagation());
    all.addEventListener("change",()=>{
      const table=row.closest("table");
      table.querySelectorAll("input.tlc-row-select").forEach(input=>{
        input.checked=all.checked;
      });
    });
    checkTh.appendChild(all);

    const noTh=document.createElement("th");
    noTh.className=NUMBER_CLASS;
    noTh.textContent="No";
    noTh.style.width="52px";
    noTh.style.textAlign="center";

    row.insertBefore(checkTh,row.firstChild);
    row.insertBefore(noTh,row.firstChild);
  }

  function addData(row,index){
    let no=row.querySelector(":scope > td."+NUMBER_CLASS);
    let check=row.querySelector(":scope > td."+CHECK_CLASS);

    if(!check){
      check=document.createElement("td");
      check.className=CHECK_CLASS;
      check.style.textAlign="center";
      const input=document.createElement("input");
      input.type="checkbox";
      input.className="tlc-row-select";
      input.addEventListener("click",event=>event.stopPropagation());
      check.appendChild(input);
      row.insertBefore(check,row.firstChild);
    }

    if(!no){
      no=document.createElement("td");
      no.className=NUMBER_CLASS;
      no.style.textAlign="center";
      row.insertBefore(no,row.firstChild);
    }

    no.textContent=String(index);
  }

  function enhance(table){
    const headers=headerRows(table);
    headers.forEach(addHeader);
    dataRows(table,headers).forEach((row,index)=>addData(row,index+1));
  }

  function run(){
    scheduled=false;
    document.querySelectorAll("table").forEach(enhance);
  }

  function schedule(){
    if(scheduled) return;
    scheduled=true;
    setTimeout(run,0);
  }

  if(document.readyState==="loading"){
    document.addEventListener("DOMContentLoaded",run,{once:true});
  }else{
    run();
  }

  new MutationObserver(schedule).observe(document.documentElement,{
    childList:true,
    subtree:true
  });
})();
</script>
</body>
</html>
