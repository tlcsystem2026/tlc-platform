<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Unified Import Center</title>
<style>
body{font-family:Arial,"Microsoft YaHei",sans-serif;margin:0;background:#f5f6f8;color:#222}
header{background:#1f4e78;color:#fff;padding:16px 22px}
main{padding:16px}
.card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:14px;margin-bottom:14px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:end}
label{display:flex;flex-direction:column;gap:4px;font-size:13px}
input,select,button,textarea{padding:8px;border:1px solid #bbb;border-radius:4px}
button{cursor:pointer}.primary{background:#1f4e78;color:#fff}.success{background:#1f7a3f;color:#fff}
.grid{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:10px}
.stats{display:grid;grid-template-columns:repeat(5,minmax(120px,1fr));gap:10px}
.stat{background:#eef3f8;border-radius:6px;padding:12px;text-align:center}
table{border-collapse:collapse;width:100%;font-size:13px}th,td{border:1px solid #ddd;padding:7px;text-align:left}th{background:#eef3f8}
.small{font-size:12px;color:#666}
@media(max-width:900px){.grid,.stats{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<h1>Unified Import Center</h1>
<div>统一管理请求书、银行流水与后续采购请款导入任务</div>
</header>
<main>
<section class="card">
<div class="toolbar">
<label>Batch
<select id="batchId"></select>
</label>
<label>导入类型
<select id="importType"></select>
</label>
<label>来源名称
<input id="sourceName" placeholder="request.xlsx / bank.csv">
</label>
<label>来源引用
<input id="sourceReference" placeholder="文件ID、路径或外部记录ID">
</label>
<label>操作人
<input id="operator">
</label>
<button class="primary" onclick="createJob()">登记导入任务</button>
<button onclick="loadAll()">刷新</button>
</div>
<div class="toolbar" style="margin-top:10px">
<button onclick="openBatch()">打开 Batch Center</button><button onclick="syncSelectedRequestFiles()">同步请求书导入任务</button>
<button onclick="window.open('/bank-import','_blank')">打开银行流水导入</button><button onclick="stageBankDocument()">暂存银行Excel/PDF</button><button onclick="registerBankCsvImport()">登记银行CSV导入结果</button>
<button onclick="window.open('/requests/review-workbench','_blank')">打开请求书审核</button><button onclick="stagePurchaseDocument()">暂存采购Excel/PDF/图片</button>
</div>
</section>

<section class="card">
<div id="stats" class="stats"></div>
</section>

<section class="card"><div id="importOperations"></div></section>

<section class="card">
<h3>Import Jobs</h3>
<div id="jobs"></div>
</section>
</main>
<script>
async function api(url,opt){
 const r=await fetch(url,opt);
 let b;try{b=await r.json()}catch(e){b=await r.text()}
 if(!r.ok)throw new Error(b.detail||String(b));
 return b
}
function esc(v){
 return String(v??"").replace(/[&<>"']/g,c=>(
  {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]
 ))
}
async function loadBatches(){
 const rows=await api("/api/tlc-batches?limit=1000");
 batchId.innerHTML='<option value="">全部 Batch</option>'+
  rows.map(x=>`<option value="${esc(x.id)}">${esc(x.batch_no)} / ${esc(x.title)}</option>`).join("")
}
async function loadTypes(){
 const rows=await api("/api/tlc-import-jobs/types");
 importType.innerHTML=rows.map(x=>`<option>${esc(x)}</option>`).join("")
}
async function loadAll(){
 const batch=batchId.value;
 const query=batch?`?batch_id=${encodeURIComponent(batch)}`:"";
 const [summary,jobs]=await Promise.all([
  api("/api/tlc-import-jobs-summary"+query),
  api("/api/tlc-import-jobs"+query)
 ]);
 stats.innerHTML=[
  ["任务数",summary.job_count],
  ["处理中",summary.processing_count],
  ["成功",summary.success_count],
  ["错误",summary.error_count],
  ["重复记录",summary.duplicate_record_count],
 ].map(x=>`<div class="stat"><b>${esc(x[1])}</b><br><span class="small">${esc(x[0])}</span></div>`).join("");
 document.getElementById("jobs").innerHTML=
  '<table><tr><th>创建时间</th><th>Batch</th><th>类型</th><th>来源</th><th>状态</th><th>记录</th><th>成功</th><th>错误</th><th>重复</th><th>操作</th></tr>'+
  jobs.map(j=>`<tr>
   <td>${esc(j.created_at)}</td><td>${esc(j.batch_id)}</td><td>${esc(j.import_type)}</td>
   <td>${esc(j.source_name||j.source_reference)}</td><td>${esc(j.status)}</td>
   <td>${j.record_count}</td><td>${j.success_count}</td><td>${j.error_count}</td><td>${j.duplicate_count}</td>
   <td><button onclick="advance('${j.id}','${j.status}')">更新</button> <button onclick="createImportErrorForJob('${j.id}')">创建错误</button> <button onclick="requestImportRetry('${j.id}')">重试</button></td>
  </tr>`).join("")+'</table>';
}
async function createJob(){
 if(!batchId.value){alert("请选择 Batch");return}
 if(!operator.value.trim()){alert("请输入操作人");return}
 if(!sourceReference.value.trim()){alert("请输入来源引用");return}
 try{
  const r=await api("/api/tlc-import-jobs",{
   method:"POST",headers:{"Content-Type":"application/json"},
   body:JSON.stringify({
    batch_id:batchId.value,import_type:importType.value,
    source_name:sourceName.value,source_reference:sourceReference.value,
    created_by:operator.value
   })
  });
  alert(r.status==="exists"?"该任务已登记":"任务登记成功");
  await loadAll();
 }catch(e){alert(e.message)}
}
async function advance(id,current){
 const next=prompt("输入下一状态：NEW / STAGED / PROCESSING / SUCCESS / ERROR / CANCELLED",current);
 if(!next)return;
 const recordCount=prompt("总记录数：","0");
 const successCount=prompt("成功数：","0");
 const errorCount=prompt("错误数：","0");
 const duplicateCount=prompt("重复数：","0");
 try{
  await api(`/api/tlc-import-jobs/${id}`,{
   method:"PUT",headers:{"Content-Type":"application/json"},
   body:JSON.stringify({
    status:next,operator:operator.value||"operator",
    record_count:Number(recordCount||0),success_count:Number(successCount||0),
    error_count:Number(errorCount||0),duplicate_count:Number(duplicateCount||0)
   })
  });
  await loadAll();
 }catch(e){alert(e.message)}
}
async function syncSelectedRequestFiles(){if(!batchId.value){alert("请选择 Batch");return}if(!operator.value.trim()){alert("请输入操作人");return}try{const result=await api(`/api/tlc-import-jobs/sync-request-files/${batchId.value}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({operator:operator.value})});alert(`同步完成：新增 ${result.created_job_count}，已存在 ${result.existing_job_count}`);await loadAll()}catch(e){alert(e.message)}}
async function registerBankCsvImport(){if(!batchId.value){alert('请选择 Batch');return}if(!operator.value.trim()){alert('请输入操作人');return}const bankImportId=prompt('请输入银行导入批次 ID：','');if(!bankImportId)return;const source=prompt('请输入 CSV 文件名或来源引用：','');if(!source)return;const total=Number(prompt('总记录数：','0')||0);const success=Number(prompt('成功数：',String(total))||0);const errors=Number(prompt('错误数：','0')||0);const duplicates=Number(prompt('重复数：','0')||0);try{const result=await api('/api/tlc-import-jobs/register-bank-csv',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({batch_id:batchId.value,bank_import_id:bankImportId,source_name:source,source_reference:`bank-csv:${bankImportId}:${source}`,registered_by:operator.value,record_count:total,success_count:success,error_count:errors,duplicate_count:duplicates})});alert(result.status==='exists'?'该银行导入批次已登记':'银行CSV任务登记成功');await loadAll()}catch(e){alert(e.message)}}
async function stageBankDocument(){
 if(!batchId.value){alert("请选择 Batch");return}
 if(!operator.value.trim()){alert("请输入操作人");return}
 const picker=document.createElement("input");
 picker.type="file";
 picker.accept=".xlsx,.xlsm,.xls,.pdf";
 picker.onchange=async()=>{
  const file=picker.files[0];
  if(!file)return;
  const type=file.name.toLowerCase().endsWith(".pdf")?"BANK_PDF":"BANK_EXCEL";
  const bankName=prompt("请输入银行名称：","")||"";
  const sourceReference=`bank-document:${batchId.value}:${file.name}:${file.size}`;
  const params=new URLSearchParams({
   batch_id:batchId.value,document_type:type,original_name:file.name,
   source_reference:sourceReference,staged_by:operator.value,bank_name:bankName
  });
  try{
   const result=await api(`/api/tlc-import-jobs/stage-bank-document?${params}`,{
    method:"POST",headers:{"Content-Type":file.type||"application/octet-stream"},
    body:await file.arrayBuffer()
   });
   alert(result.status==="exists"?"相同文件已暂存":"银行文件暂存成功");
   await loadAll();
  }catch(e){alert(e.message)}
 };
 picker.click();
}
async function stagePurchaseDocument(){
 if(!batchId.value){alert("请选择 Batch");return}
 if(!operator.value.trim()){alert("请输入操作人");return}
 const picker=document.createElement("input");
 picker.type="file";
 picker.accept=".xlsx,.xlsm,.xls,.pdf,.png,.jpg,.jpeg,.webp";
 picker.onchange=async()=>{
  const file=picker.files[0];
  if(!file)return;
  const lower=file.name.toLowerCase();
  let type="PURCHASE_IMAGE";
  if(lower.endsWith(".pdf"))type="PURCHASE_PDF";
  else if(lower.endsWith(".xlsx")||lower.endsWith(".xlsm")||lower.endsWith(".xls"))type="PURCHASE_EXCEL";
  const supplierName=prompt("请输入供应商名称：","")||"";
  const requestReference=prompt("请输入采购/请款编号：","")||"";
  const currency=prompt("请输入币种：","JPY")||"JPY";
  const totalAmount=prompt("请输入总金额：","0")||"0";
  const sourceReference=`purchase-document:${batchId.value}:${file.name}:${file.size}`;
  const params=new URLSearchParams({
   batch_id:batchId.value,
   document_type:type,
   original_name:file.name,
   source_reference:sourceReference,
   staged_by:operator.value,
   supplier_name:supplierName,
   request_reference:requestReference,
   currency,
   total_amount:totalAmount
  });
  try{
   const result=await api(`/api/tlc-import-jobs/stage-purchase-document?${params}`,{
    method:"POST",
    headers:{"Content-Type":file.type||"application/octet-stream"},
    body:await file.arrayBuffer()
   });
   alert(result.status==="exists"?"相同采购文件已暂存":"采购文件暂存成功");
   await loadAll();
  }catch(e){alert(e.message)}
 };
 picker.click();
}
async function loadImportOperations(){
 const batch=batchId.value;
 const query=batch?`?batch_id=${encodeURIComponent(batch)}`:"";
 const [summary,errors,retries]=await Promise.all([
  api("/api/tlc-import-operations/summary"+query),
  api("/api/tlc-import-operations/errors"+query),
  api("/api/tlc-import-operations/retries"+query)
 ]);
 const box=document.getElementById("importOperations");
 if(!box)return;
 box.innerHTML=`<h3>Import Error / Retry Center</h3>
 <div class="small">Open Errors=${summary.open_error_count}, Resolved=${summary.resolved_error_count}, Retries=${summary.retry_count}</div>
 <table><tr><th>类型</th><th>Job</th><th>状态</th><th>说明</th><th>操作</th></tr>`+
 errors.map(e=>`<tr><td>Error</td><td>${esc(e.import_job_id)}</td><td>${esc(e.status)}</td><td>${esc(e.message)}</td><td><button onclick="resolveImportError('${e.id}')">解决</button></td></tr>`).join("")+
 retries.map(r=>`<tr><td>Retry #${r.retry_no}</td><td>${esc(r.import_job_id)}</td><td>${esc(r.status)}</td><td>${esc(r.message)}</td><td>${r.status==="PROCESSING"?`<button onclick="completeImportRetry('${r.id}','SUCCESS')">成功</button> <button onclick="completeImportRetry('${r.id}','ERROR')">失败</button>`:""}</td></tr>`).join("")+
 '</table>';
}
async function createImportErrorForJob(jobId){
 const message=prompt("错误说明：","");
 if(!message)return;
 await api("/api/tlc-import-operations/errors",{
  method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({import_job_id:jobId,message})
 });
 await loadImportOperations();
}
async function requestImportRetry(jobId){
 if(!operator.value.trim()){alert("请输入操作人");return}
 await api("/api/tlc-import-operations/retries",{
  method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({import_job_id:jobId,requested_by:operator.value})
 });
 await loadAll();
 await loadImportOperations();
}
async function resolveImportError(errorId){
 if(!operator.value.trim()){alert("请输入操作人");return}
 const note=prompt("处理说明：","");
 if(note===null)return;
 await api(`/api/tlc-import-operations/errors/${errorId}`,{
  method:"PUT",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({status:"RESOLVED",operator:operator.value,resolution_note:note})
 });
 await loadImportOperations();
}
async function completeImportRetry(retryId,status){
 if(!operator.value.trim()){alert("请输入操作人");return}
 await api(`/api/tlc-import-operations/retries/${retryId}/complete`,{
  method:"PUT",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({status,operator:operator.value})
 });
 await loadAll();
 await loadImportOperations();
}
function openBatch(){
 if(!batchId.value){window.open("/batch-center","_blank");return}
 window.open("/batch-center","_blank")
}
batchId.addEventListener("change",loadAll);
Promise.all([loadBatches(),loadTypes()]).then(loadAll).catch(e=>alert(e.message));
</script>
<script>
/* TLC_TABLE_ROW_SELECTOR_V1 */
(function(){
  const NUMBER_CLASS="tlc-row-no";
  const CHECK_CLASS="tlc-row-check";
  let scheduled=false;

  function headerRows(table){
    const explicit=[...table.querySelectorAll("thead tr")];
    if(explicit.length) return explicit;
    const first=[...table.querySelectorAll("tr")].find(row=>row.querySelector("th"));
    return first?[first]:[];
  }

  function dataRows(table,headers){
    const headerSet=new Set(headers);
    return [...table.querySelectorAll("tr")].filter(row=>{
      if(headerSet.has(row)) return false;
      if(row.querySelector("th") && !row.querySelector("td")) return false;
      return true;
    });
  }

  function addHeader(row){
    if(row.querySelector("."+NUMBER_CLASS)) return;

    const checkTh=document.createElement("th");
    checkTh.className=CHECK_CLASS;
    checkTh.style.width="38px";
    checkTh.style.textAlign="center";

    const all=document.createElement("input");
    all.type="checkbox";
    all.title="全选/取消全选";
    all.addEventListener("click",event=>event.stopPropagation());
    all.addEventListener("change",()=>{
      const table=row.closest("table");
      table.querySelectorAll("input.tlc-row-select").forEach(input=>{
        input.checked=all.checked;
      });
    });
    checkTh.appendChild(all);

    const noTh=document.createElement("th");
    noTh.className=NUMBER_CLASS;
    noTh.textContent="No";
    noTh.style.width="52px";
    noTh.style.textAlign="center";

    row.insertBefore(checkTh,row.firstChild);
    row.insertBefore(noTh,row.firstChild);
  }

  function addData(row,index){
    let no=row.querySelector(":scope > td."+NUMBER_CLASS);
    let check=row.querySelector(":scope > td."+CHECK_CLASS);

    if(!check){
      check=document.createElement("td");
      check.className=CHECK_CLASS;
      check.style.textAlign="center";
      const input=document.createElement("input");
      input.type="checkbox";
      input.className="tlc-row-select";
      input.addEventListener("click",event=>event.stopPropagation());
      check.appendChild(input);
      row.insertBefore(check,row.firstChild);
    }

    if(!no){
      no=document.createElement("td");
      no.className=NUMBER_CLASS;
      no.style.textAlign="center";
      row.insertBefore(no,row.firstChild);
    }

    no.textContent=String(index);
  }

  function enhance(table){
    const headers=headerRows(table);
    headers.forEach(addHeader);
    dataRows(table,headers).forEach((row,index)=>addData(row,index+1));
  }

  function run(){
    scheduled=false;
    document.querySelectorAll("table").forEach(enhance);
  }

  function schedule(){
    if(scheduled) return;
    scheduled=true;
    setTimeout(run,0);
  }

  if(document.readyState==="loading"){
    document.addEventListener("DOMContentLoaded",run,{once:true});
  }else{
    run();
  }

  new MutationObserver(schedule).observe(document.documentElement,{
    childList:true,
    subtree:true
  });
})();
</script>
</body>
</html>
