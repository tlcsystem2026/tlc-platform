<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Customer Reconciliation Confirmation Center</title>
<style>body{font-family:Arial,"Microsoft YaHei";margin:0;background:#f4f6f8}header{background:#203b55;color:white;padding:20px 26px}main{padding:18px}.card{background:white;border:1px solid #ddd;border-radius:9px;padding:15px;margin-bottom:14px}.toolbar{display:flex;gap:8px;align-items:end;flex-wrap:wrap}label{display:flex;flex-direction:column;font-size:13px}input,select,button{padding:8px;border:1px solid #bbb;border-radius:4px}button{cursor:pointer}.primary{background:#203b55;color:white}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid #ddd;padding:7px;vertical-align:top}th{background:#edf2f7}a.button{padding:8px;border:1px solid #bbb;border-radius:4px;text-decoration:none;color:#222}</style></head>
<body><header><h1>Customer Reconciliation Confirmation Center</h1><div>客户对账确认、修正、取消与审计历史</div></header><main>
<section class="card"><div class="toolbar"><label>Snapshot ID<input id="snapshotId" style="min-width:260px"></label><label>操作人<input id="operator"></label><button class="primary" onclick="createCase()">建立正式对账</button><label>Customer ID<input id="customerId"></label><label>状态<select id="statusFilter"><option value="">全部</option><option>DRAFT</option><option>CONFIRMED</option><option>CORRECTION_REQUESTED</option><option>CORRECTED</option><option>CANCELLED</option></select></label><button onclick="loadCases()">刷新</button><a class="button" href="/customer-reconciliation-period-center" target="_blank">期间对账</a><a class="button" href="/sales-ledger-evidence-center" target="_blank">销售明细</a><a class="button" href="/bank-payment-evidence-center" target="_blank">入金明细</a></div></section>
<section class="card"><h3>正式客户对账</h3><div id="caseRows"></div></section><section class="card"><h3>Audit Trail</h3><div id="auditRows"></div></section>
</main><script>
async function jf(url,o={}){const r=await fetch(url,o);let b;try{b=await r.json()}catch(e){b=await r.text()}if(!r.ok)throw new Error(b.detail||String(b));return b}
function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
async function createCase(){if(!snapshotId.value.trim()||!operator.value.trim()){alert("请输入 Snapshot ID 和操作人");return}try{await jf("/api/tlc-customer-reconciliation-cases",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({snapshot_id:snapshotId.value,operator:operator.value})});await loadCases()}catch(e){alert(e.message)}}
async function act(url,body){if(!operator.value.trim()){alert("请输入操作人");return}try{await jf(url,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});await loadCases()}catch(e){alert(e.message)}}
async function confirmCase(id){await act(`/api/tlc-customer-reconciliation-cases/${id}/confirm`,{operator:operator.value,note:prompt("确认说明：","")||""})}
async function requestCorrection(id){const r=prompt("修正理由：","");if(r)await act(`/api/tlc-customer-reconciliation-cases/${id}/request-correction`,{operator:operator.value,reason:r})}
async function applyCorrection(id,s,p){const ns=prompt("修正后销售总额：",s);if(ns===null)return;const np=prompt("修正后入金总额：",p);if(np===null)return;await act(`/api/tlc-customer-reconciliation-cases/${id}/apply-correction`,{operator:operator.value,adjusted_sales_total:ns,adjusted_payment_total:np,note:prompt("修正说明：","")||""})}
async function cancelCase(id){await act(`/api/tlc-customer-reconciliation-cases/${id}/cancel`,{operator:operator.value,note:prompt("取消说明：","")||""})}
async function loadAudit(id){try{const rows=await jf(`/api/tlc-customer-reconciliation-cases/${id}/audit`);auditRows.innerHTML='<table><tr><th>时间</th><th>事件</th><th>操作者</th><th>状态</th><th>销售</th><th>入金</th><th>未付</th><th>说明</th></tr>'+rows.map(x=>`<tr><td>${esc(x.event_at)}</td><td>${esc(x.event_type)}</td><td>${esc(x.actor)}</td><td>${esc(x.old_status)} → ${esc(x.new_status)}</td><td>${esc(x.old_sales_total)} → ${esc(x.new_sales_total)}</td><td>${esc(x.old_payment_total)} → ${esc(x.new_payment_total)}</td><td>${esc(x.old_unpaid_amount)} → ${esc(x.new_unpaid_amount)}</td><td>${esc(x.message)}</td></tr>`).join("")+'</table>'}catch(e){alert(e.message)}}
async function loadCases(){const q=new URLSearchParams();if(customerId.value.trim())q.set("customer_id",customerId.value.trim());if(statusFilter.value)q.set("status",statusFilter.value);try{const rows=await jf("/api/tlc-customer-reconciliation-cases?"+q.toString());caseRows.innerHTML='<table><tr><th>客户</th><th>期间</th><th>原始金额</th><th>调整后金额</th><th>状态</th><th>操作</th></tr>'+rows.map(x=>`<tr><td>${esc(x.customer_id)}<br>${esc(x.customer_name)}</td><td>请求 ${esc(x.previous_request_cutoff)} → ${esc(x.current_request_cutoff)}<br>银行 ${esc(x.previous_bank_cutoff)} → ${esc(x.current_bank_cutoff)}</td><td>销售 ${esc(x.sales_total)}<br>入金 ${esc(x.payment_total)}<br>未付 ${esc(x.unpaid_amount)}</td><td>销售 ${esc(x.adjusted_sales_total)}<br>入金 ${esc(x.adjusted_payment_total)}<br>未付 ${esc(x.adjusted_unpaid_amount)}</td><td>${esc(x.status)}</td><td><button onclick="loadAudit('${x.id}')">审计</button> ${(x.status==="DRAFT"||x.status==="CORRECTED")?`<button onclick="confirmCase('${x.id}')">确认</button>`:""} ${x.status==="CONFIRMED"?`<button onclick="requestCorrection('${x.id}')">申请修正</button>`:""} ${x.status==="CORRECTION_REQUESTED"?`<button onclick="applyCorrection('${x.id}','${x.adjusted_sales_total}','${x.adjusted_payment_total}')">执行修正</button>`:""} ${x.status!=="CANCELLED"?`<button onclick="cancelCase('${x.id}')">取消</button>`:""}</td></tr>`).join("")+'</table>'}catch(e){alert(e.message)}}
statusFilter.addEventListener("change",loadCases);loadCases();
</script></body></html>
