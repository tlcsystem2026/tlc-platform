<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Customer Recommended Matching Center</title>
<style>body{font-family:Arial,"Microsoft YaHei";margin:0;background:#f4f6f8}header{background:#203b55;color:#fff;padding:20px 26px}main{padding:18px}.card{background:#fff;border:1px solid #ddd;border-radius:9px;padding:15px;margin-bottom:14px}.toolbar{display:flex;gap:8px;align-items:end;flex-wrap:wrap}label{display:flex;flex-direction:column;font-size:13px}input,select,button{padding:8px;border:1px solid #bbb;border-radius:4px}button{cursor:pointer}.primary{background:#203b55;color:#fff}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid #ddd;padding:7px;vertical-align:top}th{background:#edf2f7}a.button{padding:8px;border:1px solid #bbb;border-radius:4px;text-decoration:none;color:#222}</style></head>
<body><header><h1>Customer Recommended Matching Center</h1><div>根据金额接近程度和日期距离，为销售与银行入金提供推荐匹配</div></header><main>
<section class="card"><div class="toolbar"><label>Reconciliation ID<input id="rid" style="min-width:300px"></label><label>操作人<input id="op"></label><label>最低评分<input id="minScore" type="number" min="1" max="100" value="70"></label><button class="primary" onclick="generateRows()">生成推荐</button><label>状态<select id="status"><option value="">全部</option><option>RECOMMENDED</option><option>ACCEPTED</option><option>REJECTED</option><option>CANCELLED</option></select></label><button onclick="loadRows()">刷新</button><a class="button" href="/customer-auto-matching-center" target="_blank">自动核销</a><a class="button" href="/customer-reconciliation-confirmation-center" target="_blank">正式客户对账</a></div></section>
<section class="card"><h3>推荐匹配</h3><div id="rows"></div></section><section class="card"><h3>Audit Trail</h3><div id="audit"></div></section></main>
<script>
async function jf(u,o={}){const r=await fetch(u,o);let b;try{b=await r.json()}catch(e){b=await r.text()}if(!r.ok)throw new Error(b.detail||String(b));return b}
function e(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
async function generateRows(){if(!rid.value.trim()||!op.value.trim()){alert("请输入 Reconciliation ID 和操作人");return}try{const r=await jf("/api/tlc-customer-recommended-matching/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({reconciliation_id:rid.value,operator:op.value,minimum_score:Number(minScore.value||70)})});alert(`新增 ${r.created_count}，已存在 ${r.existing_count}`);await loadRows()}catch(x){alert(x.message)}}
async function decide(id,s){if(!op.value.trim()){alert("请输入操作人");return}try{await jf(`/api/tlc-customer-recommended-matching/${id}/status`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({status:s,operator:op.value,note:prompt("说明：","")||""})});await loadRows()}catch(x){alert(x.message)}}
async function showAudit(id){try{const a=await jf(`/api/tlc-customer-recommended-matching/${id}/audit`);audit.innerHTML='<table><tr><th>时间</th><th>事件</th><th>操作者</th><th>状态</th><th>说明</th></tr>'+a.map(x=>`<tr><td>${e(x.event_at)}</td><td>${e(x.event_type)}</td><td>${e(x.actor)}</td><td>${e(x.old_status)} → ${e(x.new_status)}</td><td>${e(x.message)}</td></tr>`).join('')+'</table>'}catch(x){alert(x.message)}}
async function loadRows(){const q=new URLSearchParams();if(rid.value.trim())q.set("reconciliation_id",rid.value.trim());if(status.value)q.set("status",status.value);try{const a=await jf("/api/tlc-customer-recommended-matching?"+q);rows.innerHTML='<table><tr><th>客户</th><th>销售</th><th>入金</th><th>差额</th><th>评分</th><th>规则</th><th>状态</th><th>操作</th></tr>'+a.map(x=>`<tr><td>${e(x.customer_id)}<br>${e(x.customer_name)}</td><td>${e(x.sales_date)}<br>${e(x.sales_document_no)}<br>${e(x.sales_amount)}</td><td>${e(x.payment_date)}<br>${e(x.payment_reference_no)}<br>${e(x.payment_amount)}</td><td>${e(x.difference_amount)}</td><td>金额 ${x.amount_score}<br>日期 ${x.date_score}<br><b>总分 ${x.total_score}</b></td><td>${e(x.recommendation_rule)}</td><td>${e(x.status)}</td><td><button onclick="showAudit('${x.id}')">审计</button> ${x.status==='RECOMMENDED'?`<button onclick="decide('${x.id}','ACCEPTED')">接受</button><button onclick="decide('${x.id}','REJECTED')">驳回</button>`:''} ${x.status==='ACCEPTED'?`<button onclick="decide('${x.id}','CANCELLED')">取消</button>`:''}</td></tr>`).join('')+'</table>'}catch(x){alert(x.message)}}
status.addEventListener("change",loadRows);loadRows();
</script></body></html>
