<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>银行账户与导入配置</title><style>body{font-family:Arial;margin:0;background:#f6f7f9}header{background:#1f4e78;color:#fff;padding:16px}main{padding:16px}.layout{display:grid;grid-template-columns:360px 1fr;gap:14px}.panel{background:#fff;border:1px solid #ddd;border-radius:8px;padding:14px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}input,select,textarea,button{padding:8px;border:1px solid #bbb;border-radius:4px}.list{max-height:70vh;overflow:auto}.item{padding:10px;border-bottom:1px solid #eee;cursor:pointer}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}label{display:flex;flex-direction:column;gap:4px}.primary{background:#1f4e78;color:white}@media(max-width:900px){.layout,.grid{grid-template-columns:1fr}}</style></head><body><header><h1>银行账户与导入配置</h1><div>One Screen</div></header><main><div class="layout"><section class="panel"><div class="toolbar"><select id="filterBank"></select><input id="filterAccount" placeholder="账号"><button onclick="loadRecords()">检索</button><button class="primary" onclick="newRecord()">新增</button></div><div id="recordList" class="list"></div></section><section class="panel"><div class="toolbar"><button class="primary" onclick="saveRecord()">保存</button><button onclick="window.open('/tlc-code-master','_blank')">银行Code</button></div><input id="id" type="hidden"><div class="grid"><label>银行<select id="bank"></select></label><label>启用<input id="active" type="checkbox" checked></label><label>分行代码<input id="branchCode"></label><label>分行名称<input id="branchName"></label><label>账户类型<input id="accountType"></label><label>账号<input id="accountNumber"></label><label>账户名义<input id="accountHolder"></label><label>Adapter Code<input id="adapterCode"></label><label>文件编码<input id="encoding" value="cp932"></label><label>备注<textarea id="note"></textarea></label></div></section></div></main><script>let records=[];async function api(u,o){let r=await fetch(u,o),b=await r.json();if(!r.ok)throw Error(b.detail||JSON.stringify(b));return b}async function loadBanks(){let rows=await api('/api/tlc-codes/values?category_code=BANK');for(let id of ['filterBank','bank']){let s=document.getElementById(id);s.innerHTML=id==='filterBank'?'<option value="">全部银行</option>':'';rows.filter(x=>x.active).forEach(x=>s.add(new Option(x.code+' / '+(x.name_ja||x.name_zh||x.name_en),x.code)))}}async function loadRecords(){let p=new URLSearchParams(),b=filterBank.value,a=filterAccount.value.trim();if(b)p.set('bank_code',b);if(a)p.set('account_number',a);records=await api('/api/tlc-bank-accounts?'+p);recordList.innerHTML='';records.forEach(r=>{let d=document.createElement('div');d.className='item';d.textContent=r.bank_code+' / '+r.branch_name+' / '+r.account_number;d.onclick=()=>select(r);recordList.appendChild(d)})}function select(r){id.value=r.id;bank.value=r.bank_code;branchCode.value=r.branch_code;branchName.value=r.branch_name;accountType.value=r.account_type;accountNumber.value=r.account_number;accountHolder.value=r.account_holder;adapterCode.value=r.adapter_code;encoding.value=r.file_encoding;active.checked=r.active;note.value=r.note}function newRecord(){for(let x of ['id','branchCode','branchName','accountType','accountNumber','accountHolder','adapterCode','note'])document.getElementById(x).value='';encoding.value='cp932';active.checked=true}async function saveRecord(){let p={id:id.value,bank_code:bank.value,branch_code:branchCode.value,branch_name:branchName.value,account_type:accountType.value,account_number:accountNumber.value,account_holder:accountHolder.value,adapter_code:adapterCode.value,file_encoding:encoding.value,active:active.checked,note:note.value};try{await api('/api/tlc-bank-accounts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});await loadRecords();newRecord()}catch(e){alert(e.message)}}bank.ondblclick=()=>window.open('/tlc-code-master','_blank');Promise.all([loadBanks(),loadRecords()]).catch(e=>alert(e.message));</script></body></html>
