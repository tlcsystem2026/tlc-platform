<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>System Parameter Center</title>
<style>body{font-family:Arial,"Microsoft YaHei";margin:0;background:#f4f6f8;color:#222}header{background:#203b55;color:#fff;padding:20px 26px}main{max-width:1100px;margin:auto;padding:18px}.card{background:#fff;border:1px solid #ddd;border-radius:9px;padding:18px;margin-bottom:14px}.grid{display:grid;grid-template-columns:240px 1fr;gap:11px 14px;align-items:center}input{padding:9px;border:1px solid #bbb;border-radius:4px;width:100%;box-sizing:border-box}input[readonly]{background:#eee;color:#555}.toolbar{display:flex;gap:8px;margin-top:16px}button{padding:9px 16px;border:1px solid #aaa;border-radius:4px;cursor:pointer}.primary{background:#203b55;color:#fff}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid #ddd;padding:8px;text-align:left}th{background:#edf2f7}.ok{color:#147a39;font-weight:bold}.bad{color:#a12622;font-weight:bold}.note{font-size:13px;color:#555;line-height:1.55}</style></head>
<body><header><h1>系统参数维护</h1><div>System Parameter Center</div></header><main>
<section class="card"><h2>请求书导入目录设置</h2><p class="note">请求书按业务年月 YYYYMM 管理。页面不设置创建目录按钮；保存参数后，系统在需要时自动创建标准目录。</p>
<div class="grid"><label>请求书根目录</label><input id="root"><label>Incoming 子目录</label><input id="incoming"><label>Processing 子目录</label><input id="processing"><label>Completed 子目录</label><input id="completed"><label>Error 子目录</label><input id="error"><label>Archive 子目录</label><input id="archive"><label>年月目录格式</label><input id="monthFormat" readonly></div>
<div class="toolbar"><button class="primary" onclick="saveSettings()">保存</button><button onclick="checkSettings()">路径核查</button></div><div id="message" class="note"></div></section>
<section class="card"><h2>路径核查结果</h2><div id="checks" class="note">尚未执行路径核查。</div></section>
<section class="card"><h2>业务年月目录</h2><div id="months" class="note">尚未执行路径核查。</div></section></main>
<script>
const api='/api/tlc-system-parameters/request-folders';
async function jf(url,o={}){const r=await fetch(url,o);let b;try{b=await r.json()}catch(e){b=await r.text()}if(!r.ok)throw new Error(b.detail||String(b));return b}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function values(){return{request_root_path:root.value.trim(),request_incoming_dir:incoming.value.trim(),request_processing_dir:processing.value.trim(),request_completed_dir:completed.value.trim(),request_error_dir:error.value.trim(),request_archive_dir:archive.value.trim(),request_month_folder_format:monthFormat.value.trim()}}
async function loadSettings(){try{const s=await jf(api);root.value=s.request_root_path;incoming.value=s.request_incoming_dir;processing.value=s.request_processing_dir;completed.value=s.request_completed_dir;error.value=s.request_error_dir;archive.value=s.request_archive_dir;monthFormat.value=s.request_month_folder_format}catch(e){message.textContent=e.message}}
async function saveSettings(){try{await jf(api,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(values())});message.innerHTML='<span class="ok">保存成功。标准目录已按需自动创建。</span>';await checkSettings()}catch(e){message.innerHTML='<span class="bad">'+esc(e.message)+'</span>'}}
async function checkSettings(){try{const r=await jf(api+'/check');checks.innerHTML='<table><tr><th>目录</th><th>路径</th><th>存在</th><th>可读</th><th>可写</th></tr>'+r.checks.map(x=>`<tr><td>${esc(x.name)}</td><td>${esc(x.path)}</td><td class="${x.exists?'ok':'bad'}">${x.exists?'是':'否'}</td><td class="${x.readable?'ok':'bad'}">${x.readable?'是':'否'}</td><td class="${x.writable?'ok':'bad'}">${x.writable?'是':'否'}</td></tr>`).join('')+'</table>';const v=r.valid_month_folders.length?r.valid_month_folders.join(', '):'无';const i=r.invalid_month_folders.length?r.invalid_month_folders.join(', '):'无';months.innerHTML=`<p>合法 YYYYMM 目录：<b>${esc(v)}</b></p><p>非法目录（仅提示，不修改）：<b class="${r.invalid_month_folders.length?'bad':''}">${esc(i)}</b></p>`}catch(e){checks.innerHTML='<span class="bad">'+esc(e.message)+'</span>'}}
loadSettings();
</script></body></html>
