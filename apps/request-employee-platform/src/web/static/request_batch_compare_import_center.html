<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>请求书批量核对与初步导入</title><style>body{font-family:Arial,"Microsoft YaHei";background:#f4f6f8;margin:0}header{background:#203b55;color:#fff;padding:20px}main{padding:18px}.card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:16px;margin-bottom:14px}.toolbar{display:flex;gap:8px;align-items:end;flex-wrap:wrap}input,button{padding:8px}button{cursor:pointer}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:7px}th{background:#edf2f7}.small{font-size:12px;color:#666}</style></head><body><header><h1>请求书批量核对与初步导入</h1><div>扫描 Incoming/YYYYMM，配对 PDF/Excel，生成异常文件并写入 Review Queue</div></header><main><section class="card"><div class="toolbar"><label>业务年月（YYYYMM）<input id="month" value="202601"></label><label>操作人<input id="operator"></label><button onclick="runBatch()">执行 Batch</button><button onclick="loadLatest()">刷新</button></div></section><section class="card"><h3>最新 Batch</h3><div id="summary">尚未执行。</div></section><section class="card"><h3>Review Queue（只读预览）</h3><div id="queue"></div></section></main><script>const api='/api/tlc-request-batch-compare-import';async function jf(u,o={}){const r=await fetch(u,o);let b;try{b=await r.json()}catch(e){b=await r.text()}if(!r.ok)throw new Error(b.detail||String(b));return b}function e(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}async function runBatch(){if(!month.value.trim()||!operator.value.trim()){alert('请输入业务年月和操作人');return}try{await jf(api+'/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({business_month:month.value.trim(),operator:operator.value.trim()})});await loadLatest()}catch(x){alert(x.message)}}async function loadLatest(){try{const b=await jf(api+'/latest?business_month='+encodeURIComponent(month.value.trim()));summary.innerHTML=b?`状态：<b>${e(b.status)}</b><br>文件：${b.total_file_count}；配对：${b.pair_count}；待Review：${b.review_count}；异常：${b.exception_count}；错误：${b.error_count}<br>异常文件：${e(b.exception_report_path||'无')}<br><span class="small">${e(b.message)}</span>`:'无Batch记录';const rows=await jf(api+'/review-queue?business_month='+encodeURIComponent(month.value.trim()));queue.innerHTML='<table><tr><th>Pair Key</th><th>核对状态</th><th>原始客户名</th><th>系统客户</th><th>异常</th></tr>'+rows.map(x=>`<tr><td>${e(x.pair_key)}</td><td>${e(x.compare_status)}</td><td>${e(x.raw_customer_name)}</td><td>${e(x.system_customer_code)} ${e(x.system_customer_name)}</td><td>${e(x.exception_codes)}</td></tr>`).join('')+'</table>'}catch(x){alert(x.message)}}loadLatest();</script><script>
/* TLC_TABLE_ROW_SELECTOR_V1 */
(function(){
  const NUMBER_CLASS="tlc-row-no";
  const CHECK_CLASS="tlc-row-check";
  let scheduled=false;

  function headerRows(table){
    const explicit=[...table.querySelectorAll("thead tr")];
    if(explicit.length) return explicit;
    const first=[...table.querySelectorAll("tr")].find(row=>row.querySelector("th"));
    return first?[first]:[];
  }

  function dataRows(table,headers){
    const headerSet=new Set(headers);
    return [...table.querySelectorAll("tr")].filter(row=>{
      if(headerSet.has(row)) return false;
      if(row.querySelector("th") && !row.querySelector("td")) return false;
      return true;
    });
  }

  function addHeader(row){
    if(row.querySelector("."+NUMBER_CLASS)) return;

    const checkTh=document.createElement("th");
    checkTh.className=CHECK_CLASS;
    checkTh.style.width="38px";
    checkTh.style.textAlign="center";

    const all=document.createElement("input");
    all.type="checkbox";
    all.title="全选/取消全选";
    all.addEventListener("click",event=>event.stopPropagation());
    all.addEventListener("change",()=>{
      const table=row.closest("table");
      table.querySelectorAll("input.tlc-row-select").forEach(input=>{
        input.checked=all.checked;
      });
    });
    checkTh.appendChild(all);

    const noTh=document.createElement("th");
    noTh.className=NUMBER_CLASS;
    noTh.textContent="No";
    noTh.style.width="52px";
    noTh.style.textAlign="center";

    row.insertBefore(checkTh,row.firstChild);
    row.insertBefore(noTh,row.firstChild);
  }

  function addData(row,index){
    let no=row.querySelector(":scope > td."+NUMBER_CLASS);
    let check=row.querySelector(":scope > td."+CHECK_CLASS);

    if(!check){
      check=document.createElement("td");
      check.className=CHECK_CLASS;
      check.style.textAlign="center";
      const input=document.createElement("input");
      input.type="checkbox";
      input.className="tlc-row-select";
      input.addEventListener("click",event=>event.stopPropagation());
      check.appendChild(input);
      row.insertBefore(check,row.firstChild);
    }

    if(!no){
      no=document.createElement("td");
      no.className=NUMBER_CLASS;
      no.style.textAlign="center";
      row.insertBefore(no,row.firstChild);
    }

    no.textContent=String(index);
  }

  function enhance(table){
    const headers=headerRows(table);
    headers.forEach(addHeader);
    dataRows(table,headers).forEach((row,index)=>addData(row,index+1));
  }

  function run(){
    scheduled=false;
    document.querySelectorAll("table").forEach(enhance);
  }

  function schedule(){
    if(scheduled) return;
    scheduled=true;
    setTimeout(run,0);
  }

  if(document.readyState==="loading"){
    document.addEventListener("DOMContentLoaded",run,{once:true});
  }else{
    run();
  }

  new MutationObserver(schedule).observe(document.documentElement,{
    childList:true,
    subtree:true
  });
})();
</script>
</body></html>
