<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><title>请求书审核台</title><style>body{font-family:"Microsoft YaHei";background:#f6f8fb;margin:0}header{background:#ea580c;color:white;padding:22px 30px}.card{background:white;margin:18px;padding:18px;border-radius:14px}.diff{border-left:4px solid red;padding:8px;background:#fff7ed}</style></head><body><header><h1>请求书审核台</h1><p>PDF / Excel 核对异常・员工处理・领导审核</p></header><div class="card"><a href="/dashboard">返回仪表盘</a></div><div id="tasks"></div><script>async function load(){let r=await fetch('/api/requests/review-tasks');let ts=await r.json();tasks.innerHTML=ts.length?ts.map(t=>'<div class="card"><h2>'+t.title_zh+'</h2>'+((t.detail.differences||[]).map(d=>'<div class="diff"><b>'+d.field+'</b><br>PDF:'+d.pdf_value+'<br>Excel:'+d.excel_value+'<br>'+d.message_zh+'<br>'+d.message_ja+'</div>').join(''))+'</div>').join(''):'<div class="card">当前没有待处理请求书异常</div>'}load()</script></body></html>
