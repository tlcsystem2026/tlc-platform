<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><title>TLC Business Navigator</title><style>body{margin:0;font-family:"Microsoft YaHei","Segoe UI",sans-serif;background:#f6f8fb;color:#1f2937}header{padding:24px 32px;background:linear-gradient(90deg,#1e3a8a,#2563eb);color:white}main{padding:24px 32px;max-width:1440px;margin:0 auto}.grid{display:grid;gap:16px}.kpi{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}.layout{grid-template-columns:1.2fr .8fr}.card{background:white;border-radius:16px;padding:18px;box-shadow:0 8px 24px rgba(16,24,40,.06);border:1px solid #e5e7eb}.value{font-size:26px;font-weight:700}.desc{color:#667085}.todo{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #eef2f7}.badge{border-radius:999px;padding:4px 10px;color:white;font-weight:700}.high{background:#d97706}.normal{background:#2563eb}.nav{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}a{text-decoration:none;color:inherit}.navitem{border:1px solid #e5e7eb;border-radius:14px;padding:14px;background:#fff;min-height:112px}.cat{font-size:12px;color:#2563eb;background:#eff6ff;border-radius:999px;padding:3px 8px}</style></head><body><header><h1>TLC Business Navigator</h1><p>今日TODO・业绩・异常・业务入口｜Build030 TRUE FULL</p></header><main><section class="grid kpi" id="kpis"></section><section class="grid layout" style="margin-top:16px"><div class="card"><h2>今日TODO</h2><div id="todos"></div></div><div class="card"><h2>重要异常</h2><div id="alerts"></div></div></section><section class="card" style="margin-top:16px"><h2>业务入口</h2><div class="grid nav" id="navigator"></div></section><div class="desc" id="footer" style="margin-top:20px"></div></main><script>async function loadDashboard(){let r=await fetch('/api/dashboard/summary');let d=await r.json();kpis.innerHTML=d.performance.map(x=>`<a class="card" href="${x.href}"><div class="desc">${x.title}</div><div class="value">${x.value} ${x.unit||''}</div><div>${x.trend||''}</div></a>`).join('');let th=x=>`<a class="todo" href="${x.href}"><span>${x.title}</span><span class="badge ${x.priority}">${x.count}</span></a>`;todos.innerHTML=d.todos.map(th).join('');alerts.innerHTML=d.alerts.map(th).join('');navigator.innerHTML=d.navigator.map(x=>`<a class="navitem" href="${x.href}"><span class="cat">${x.category}</span><h3>${x.title}</h3><div class="desc">${x.description}</div></a>`).join('');footer.textContent=`Environment: ${d.environment} | Date: ${d.date} | Build030`}loadDashboard()</script></body></html>
