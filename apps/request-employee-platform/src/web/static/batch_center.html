<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Batch Center</title>
<style>
body{font-family:Arial,"Microsoft YaHei";margin:0;background:#f5f6f8}header{background:#1f4e78;color:#fff;padding:16px 22px}
main{padding:16px}.layout{display:grid;grid-template-columns:380px 1fr;gap:14px}.card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:14px;margin-bottom:14px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:end}input,select,button,textarea{padding:8px;border:1px solid #bbb;border-radius:4px}
button{cursor:pointer}.primary{background:#1f4e78;color:#fff}.list{max-height:70vh;overflow:auto;border:1px solid #ddd}.item{padding:10px;border-bottom:1px solid #eee;cursor:pointer}.item:hover{background:#eaf2fb}
.tabs{display:flex;gap:6px;flex-wrap:wrap}.tab{background:#eef3f8}.tab.active{background:#1f4e78;color:#fff}
table{border-collapse:collapse;width:100%;font-size:13px}th,td{border:1px solid #ddd;padding:7px;text-align:left}th{background:#eef3f8}
.small{font-size:12px;color:#666}@media(max-width:900px){.layout{grid-template-columns:1fr}}
</style></head><body>
<header><h1>Batch Center</h1><div>业务批次与请求书导入</div></header><main>
<div class="layout">
<section class="card"><div class="toolbar"><input id="month" type="month"><button onclick="loadBatches()">检索</button><button class="primary" onclick="newBatch()">新增</button></div><div id="list" class="list"></div></section>
<section>
<div class="card"><div class="toolbar"><input id="id" type="hidden"><label>Batch No<input id="no" readonly></label><label>业务年月<input id="businessMonth" type="month"></label><label>标题<input id="title"></label><label>创建人<input id="createdBy"></label><button class="primary" onclick="saveBatch()">保存</button></div></div>
<div class="card"><div class="tabs">
<button class="tab active" onclick="showTab('basic',this)">基本信息</button>
<button class="tab" onclick="showTab('request',this)">Request Import</button>
<button class="tab" onclick="showTab('compare',this)">Compare</button>
<button class="tab" onclick="showTab('error',this)">Error</button>
<button class="tab" onclick="showTab('review',this)">Review</button>
<button class="tab" onclick="showTab('sales',this)">Sales Ledger</button>
<button class="tab" onclick="showTab('bank',this)">Bank Import</button>
<button class="tab" onclick="showTab('reconciliation',this)">Reconciliation</button>
<button class="tab" onclick="showTab('history',this)">History</button>
</div><div id="panel"></div></div>
</section></div></main>
<script>
let selected=null;
function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
async function api(url,opt){const r=await fetch(url,opt);const b=await r.json();if(!r.ok)throw new Error(b.detail||JSON.stringify(b));return b}
async function loadBatches(){const p=new URLSearchParams();if(month.value)p.set("business_month",month.value);const rows=await api("/api/tlc-batches?"+p);list.innerHTML="";rows.forEach(b=>{const d=document.createElement("div");d.className="item";d.innerHTML=`<b>${esc(b.batch_no)}</b> [${esc(b.status)}]<br>${esc(b.title)}`;d.onclick=()=>select(b);list.appendChild(d)})}
function select(b){selected=b;id.value=b.id;no.value=b.batch_no;businessMonth.value=b.business_month;title.value=b.title;createdBy.value=b.created_by;showTab("basic")}
function newBatch(){selected=null;id.value=no.value=title.value=createdBy.value="";businessMonth.value=new Date().toISOString().slice(0,7);showTab("basic")}
async function saveBatch(){const body={business_month:businessMonth.value,title:title.value,created_by:createdBy.value};const b=selected?await api(`/api/tlc-batches/${selected.id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}):await api("/api/tlc-batches",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});select(b);await loadBatches()}
async function showTab(name,btn){document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));if(btn)btn.classList.add("active");if(name==="request"){panel.innerHTML=`<h3>Request Import</h3><div class="toolbar"><input id="excel" type="file" accept=".xlsx,.xlsm,.xls"><button class="primary" onclick="upload('REQUEST_EXCEL','excel')">上传Excel</button><input id="pdf" type="file" accept=".pdf"><button class="primary" onclick="upload('REQUEST_PDF','pdf')">上传PDF</button><button onclick="refreshImport()">刷新</button></div><div id="ready" class="small"></div><div id="files"></div><h4>Import Log</h4><div id="logs"></div>`;await refreshImport()}
else if(name==="basic")panel.innerHTML="<h3>基本信息</h3><p>一个 Batch 对应一个业务年月案件。</p>";
else if(name==="review")panel.innerHTML='<p><a target="_blank" href="/requests/review-workbench">打开审核工作台</a></p>';
else if(name==="bank")panel.innerHTML='<p><a target="_blank" href="/bank-import">打开银行流水导入</a></p>';
else if(name==="reconciliation")panel.innerHTML='<p><a target="_blank" href="/customer-reconciliation-workbench">打开客户对账</a></p>';
else panel.innerHTML=`<h3>${esc(name)}</h3><p>下一任务接入。</p>`}
async function upload(type,input){if(!selected){alert("请先选择Batch");return}const f=document.getElementById(input).files[0];if(!f){alert("请选择文件");return}const p=new URLSearchParams({file_type:type,original_name:f.name,uploaded_by:createdBy.value||selected.created_by});const r=await api(`/api/tlc-batches/${selected.id}/request-files?${p}`,{method:"POST",headers:{"Content-Type":f.type||"application/octet-stream"},body:await f.arrayBuffer()});alert(r.status==="duplicate"?"重复文件已跳过":"上传成功");await refreshImport();selected=await api(`/api/tlc-batches/${selected.id}`);await loadBatches()}
async function refreshImport(){if(!selected)return;const [r,f,l]=await Promise.all([api(`/api/tlc-batches/${selected.id}/request-import-readiness`),api(`/api/tlc-batches/${selected.id}/request-files`),api(`/api/tlc-batches/${selected.id}/import-logs`)]);ready.textContent=r.ready_for_compare?"Excel与PDF已齐备，可以进入Compare":"缺少："+r.missing_file_types.join(", ");files.innerHTML='<table><tr><th>类型</th><th>文件</th><th>版本</th><th>状态</th></tr>'+f.map(x=>`<tr><td>${x.file_type}</td><td>${esc(x.original_name)}</td><td>v${x.version_no}</td><td>${x.active?"当前":"历史"}</td></tr>`).join("")+'</table>';logs.innerHTML='<table><tr><th>时间</th><th>文件</th><th>结果</th><th>说明</th></tr>'+l.map(x=>`<tr><td>${esc(x.created_at)}</td><td>${esc(x.original_name)}</td><td>${esc(x.status)}</td><td>${esc(x.message)}</td></tr>`).join("")+'</table>'}
loadBatches().then(newBatch).catch(e=>alert(e.message));
</script></body></html>
