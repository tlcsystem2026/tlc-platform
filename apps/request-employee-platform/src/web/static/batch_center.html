<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Batch Center</title>
<style>body{font-family:Arial,"Microsoft YaHei";margin:0;background:#f5f6f8}header{background:#1f4e78;color:#fff;padding:16px 22px}main{padding:16px}.layout{display:grid;grid-template-columns:380px 1fr;gap:14px}.card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:14px;margin-bottom:14px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:end}input,button{padding:8px;border:1px solid #bbb;border-radius:4px}button{cursor:pointer}.primary{background:#1f4e78;color:#fff}.list{max-height:70vh;overflow:auto;border:1px solid #ddd}.item{padding:10px;border-bottom:1px solid #eee;cursor:pointer}.tabs{display:flex;gap:6px;flex-wrap:wrap}.tab{background:#eef3f8}.tab.active{background:#1f4e78;color:#fff}table{border-collapse:collapse;width:100%;font-size:13px}th,td{border:1px solid #ddd;padding:7px;text-align:left}th{background:#eef3f8}.small{font-size:12px;color:#666}@media(max-width:900px){.layout{grid-template-columns:1fr}}</style></head>
<body><header><h1>Batch Center</h1><div>请求书导入与比较中心</div></header><main><div class="layout">
<section class="card"><div class="toolbar"><input id="month" type="month"><button onclick="loadBatches()">检索</button><button class="primary" onclick="newBatch()">新增</button></div><div id="list" class="list"></div></section>
<section><div class="card"><div class="toolbar"><input id="id" type="hidden"><label>Batch No<input id="no" readonly></label><label>业务年月<input id="businessMonth" type="month"></label><label>标题<input id="title"></label><label>创建人<input id="createdBy"></label><button class="primary" onclick="saveBatch()">保存</button></div></div>
<div class="card"><div class="tabs"><button class="tab active" onclick="showTab('basic',this)">基本信息</button><button class="tab" onclick="showTab('request',this)">Request Import</button><button class="tab" onclick="showTab('compare',this)">Compare</button><button class="tab" onclick="showTab('error',this)">Error</button><button class="tab" onclick="showTab('review',this)">Review</button><button class="tab" onclick="showTab('sales',this)">Sales Ledger</button><button class="tab" onclick="showTab('bank',this)">Bank Import</button><button class="tab" onclick="showTab('reconciliation',this)">Reconciliation</button><button class="tab" onclick="showTab('history',this)">History</button></div><div id="panel"></div></div></section></div></main>
<script>
let selected=null;
function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
async function api(url,opt){const r=await fetch(url,opt);const b=await r.json();if(!r.ok)throw new Error(b.detail||JSON.stringify(b));return b}
async function loadBatches(){const p=new URLSearchParams();if(month.value)p.set("business_month",month.value);const rows=await api("/api/tlc-batches?"+p);list.innerHTML="";rows.forEach(b=>{const d=document.createElement("div");d.className="item";d.innerHTML=`<b>${esc(b.batch_no)}</b> [${esc(b.status)}]<br>${esc(b.title)}`;d.onclick=()=>select(b);list.appendChild(d)})}
function select(b){selected=b;id.value=b.id;no.value=b.batch_no;businessMonth.value=b.business_month;title.value=b.title;createdBy.value=b.created_by;showTab("basic")}
function newBatch(){selected=null;id.value=no.value=title.value=createdBy.value="";businessMonth.value=new Date().toISOString().slice(0,7);showTab("basic")}
async function saveBatch(){const body={business_month:businessMonth.value,title:title.value,created_by:createdBy.value};const b=selected?await api(`/api/tlc-batches/${selected.id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}):await api("/api/tlc-batches",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});select(b);await loadBatches()}
async function showTab(name,btn){document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));if(btn)btn.classList.add("active");
if(name==="request"){panel.innerHTML=`<h3>Request Import</h3><div class="toolbar"><button onclick="window.open('/import-center','_blank')">打开统一导入中心</button></div><div class="toolbar"><input id="excel" type="file" accept=".xlsx,.xlsm,.xls"><button class="primary" onclick="upload('REQUEST_EXCEL','excel')">上传Excel</button><input id="pdf" type="file" accept=".pdf"><button class="primary" onclick="upload('REQUEST_PDF','pdf')">上传PDF</button><button onclick="refreshImport()">刷新</button></div><div id="ready" class="small"></div><div id="files"></div><h4>Import Log</h4><div id="logs"></div>`;await refreshImport()}
else if(name==="compare"){panel.innerHTML=`<h3>Compare</h3><div class="toolbar"><button class="primary" onclick="runCompare()">执行 Excel / PDF 比较</button><button onclick="refreshCompare()">刷新</button></div><div id="compareSummary" class="small"></div><div id="compareDetails"></div><h4>Compare History</h4><div id="compareHistory"></div>`;await refreshCompare()}
else if(name==="error"){panel.innerHTML=`<h3>Error Center</h3><div class="toolbar"><button class="primary" onclick="syncErrors()">同步最新比较错误</button><button onclick="refreshErrors()">刷新</button><button onclick="downloadErrors()">导出CSV</button><button onclick="reopenImport()">修正后重新导入</button></div><div id="errorSummary" class="small"></div><div id="errorList"></div>`;await refreshErrors()}
else if(name==="basic")panel.innerHTML="<h3>基本信息</h3><p>一个 Batch 对应一个业务年月案件。</p>";
else if(name==="review"){panel.innerHTML=`<h3>Review Center</h3><div class="toolbar"><button class="primary" onclick="sendToPendingReview()">送入待审核</button><button onclick="refreshReviewLinks()">刷新</button><button onclick="window.open('/requests/review-workbench','_blank')">打开审核工作台</button></div><div id="reviewMessage" class="small"></div><div id="reviewLinks"></div>`;await refreshReviewLinks()}
else if(name==="sales"){
 panel.innerHTML=`<h3>Sales Ledger Center</h3>
 <div class="toolbar">
   <button class="primary" onclick="registerLedgerLink()">登记正式台账</button>
   <button onclick="refreshLedgerLinks()">刷新</button>
   <button onclick="window.open('/requests/review-workbench','_blank')">打开销售台账</button>
 </div>
 <div id="ledgerSummary" class="small"></div>
 <div id="ledgerLinks"></div>`;
 await refreshLedgerLinks();
}
else if(name==="bank")panel.innerHTML='<p><a target="_blank" href="/bank-import">打开银行流水导入</a></p>';
else if(name==="bank"){panel.innerHTML=`<h3>Bank Center</h3><div class="toolbar"><button class="primary" onclick="registerBankLink()">登记银行流水</button><button onclick="refreshBankLinks()">刷新</button><button onclick="window.open('/bank-import','_blank')">打开银行流水导入</button></div><div id="bankSummary" class="small"></div><div id="bankLinks"></div>`;await refreshBankLinks()}
else if(name==="reconciliation"){
 panel.innerHTML=`<h3>Reconciliation Center</h3>
 <div class="toolbar">
   <button class="primary" onclick="registerReconciliationLink()">登记对账结果</button>
   <button onclick="refreshReconciliationLinks()">刷新</button>
   <button onclick="finishReconciliationBatch()">完成Batch</button>
   <button onclick="window.open('/customer-reconciliation-workbench','_blank')">打开客户对账工作台</button>
 </div>
 <div id="reconciliationSummary" class="small"></div>
 <div id="reconciliationLinks"></div>`;
 await refreshReconciliationLinks();
}
else if(name==="history"){
 panel.innerHTML=`<h3>Batch Lifecycle Overview</h3>
 <div class="toolbar"><button class="primary" onclick="refreshLifecycleOverview()">刷新总览</button></div>
 <div id="lifecycleProgress" class="small"></div>
 <div id="lifecycleChecks"></div>
 <h4>Timeline</h4>
 <div id="lifecycleTimeline"></div>`;
 await refreshLifecycleOverview();
}
else panel.innerHTML=`<h3>${esc(name)}</h3><p>下一任务接入。</p>`}
async function upload(type,input){if(!selected){alert("请先选择Batch");return}const f=document.getElementById(input).files[0];if(!f){alert("请选择文件");return}const p=new URLSearchParams({file_type:type,original_name:f.name,uploaded_by:createdBy.value||selected.created_by});const r=await api(`/api/tlc-batches/${selected.id}/request-files?${p}`,{method:"POST",headers:{"Content-Type":f.type||"application/octet-stream"},body:await f.arrayBuffer()});alert(r.status==="duplicate"?"重复文件已跳过":"上传成功");await refreshImport();selected=await api(`/api/tlc-batches/${selected.id}`);await loadBatches()}
async function refreshImport(){if(!selected)return;
 try{await api(`/api/tlc-import-jobs/sync-request-files/${selected.id}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({operator:createdBy.value||selected.created_by})})}catch(e){console.warn(e.message)}const [r,f,l]=await Promise.all([api(`/api/tlc-batches/${selected.id}/request-import-readiness`),api(`/api/tlc-batches/${selected.id}/request-files`),api(`/api/tlc-batches/${selected.id}/import-logs`)]);ready.textContent=r.ready_for_compare?"Excel与PDF已齐备，可以进入Compare":"缺少："+r.missing_file_types.join(", ");files.innerHTML='<table><tr><th>类型</th><th>文件</th><th>版本</th><th>状态</th></tr>'+f.map(x=>`<tr><td>${x.file_type}</td><td>${esc(x.original_name)}</td><td>v${x.version_no}</td><td>${x.active?"当前":"历史"}</td></tr>`).join("")+'</table>';logs.innerHTML='<table><tr><th>时间</th><th>文件</th><th>结果</th></tr>'+l.map(x=>`<tr><td>${esc(x.created_at)}</td><td>${esc(x.original_name)}</td><td>${esc(x.status)}</td></tr>`).join("")+'</table>'}
async function syncErrors(){if(!selected){alert("请先选择Batch");return}await api(`/api/tlc-batches/${selected.id}/errors/sync`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({operator:createdBy.value||selected.created_by})});await refreshErrors()}
async function refreshErrors(){if(!selected)return;const [s,rows]=await Promise.all([api(`/api/tlc-batches/${selected.id}/errors/summary`),api(`/api/tlc-batches/${selected.id}/errors`)]);const a=document.getElementById("errorSummary"),b=document.getElementById("errorList");if(!a)return;a.textContent=`Total=${s.total}, Open=${s.open}, Resolved=${s.resolved}, Ignored=${s.ignored}`;b.innerHTML='<table><tr><th>No</th><th>字段</th><th>Excel</th><th>PDF</th><th>说明</th><th>状态</th><th>处理</th></tr>'+rows.map(r=>`<tr><td>${r.error_no}</td><td>${esc(r.field)}</td><td>${esc(r.excel_value)}</td><td>${esc(r.pdf_value)}</td><td>${esc(r.message)}</td><td>${esc(r.status)}</td><td><button onclick="setErrorStatus(\'${r.id}\',\'RESOLVED\')">解决</button> <button onclick="setErrorStatus(\'${r.id}\',\'IGNORED\')">忽略</button> <button onclick="setErrorStatus(\'${r.id}\',\'OPEN\')">重开</button></td></tr>`).join("")+'</table>'}
async function setErrorStatus(id,status){const note=prompt("处理说明：","");if(note===null)return;await api(`/api/tlc-batches/${selected.id}/errors/${id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({status,operator:createdBy.value||selected.created_by,resolution_note:note})});await refreshErrors()}
function downloadErrors(){if(selected)window.open(`/api/tlc-batches/${selected.id}/errors/export.csv`,"_blank")}
async function reopenImport(){if(!selected||!confirm("确认返回 Request Import 上传修正版？"))return;selected=await api(`/api/tlc-batches/${selected.id}/errors/reopen-import`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({operator:createdBy.value||selected.created_by})});await loadBatches();alert("Batch 已返回 IMPORTING") }
async function sendToPendingReview(){if(!selected){alert("请先选择Batch");return}try{const p=await api(`/api/tlc-batches/${selected.id}/review/payload`);const c=await api("/api/requests/pending-review",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(p)});const r=(c&&c.record)||c;const pid=r.id||r.pending_review_id;if(!pid)throw new Error("Pending Review API did not return record id");const x=await api(`/api/tlc-batches/${selected.id}/review/links`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({pending_review_id:pid,linked_by:createdBy.value||selected.created_by,note:"Created from Batch Center"})});reviewMessage.textContent=x.status==="exists"?"该比较结果已进入待审核":"已送入待审核";selected=await api(`/api/tlc-batches/${selected.id}`);await loadBatches();await refreshReviewLinks()}catch(e){alert(e.message)}}
async function refreshReviewLinks(){if(!selected)return;const rows=await api(`/api/tlc-batches/${selected.id}/review/links`);const d=document.getElementById("reviewLinks");if(!d)return;d.innerHTML='<table><tr><th>请求书</th><th>Pending Review ID</th><th>状态</th><th>进入时间</th><th>操作</th></tr>'+rows.map(r=>`<tr><td>${esc(r.request_no)}</td><td>${esc(r.pending_review_id)}</td><td>${esc(r.review_status)}</td><td>${esc(r.linked_at)}</td><td><button onclick="setReviewStatus('${r.id}','APPROVED')">审核通过</button> <button onclick="setReviewStatus('${r.id}','REJECTED')">退回</button> <button onclick="setReviewStatus('${r.id}','CANCELLED')">取消</button> <button onclick="setReviewStatus('${r.id}','POSTED')">已入台账</button></td></tr>`).join("")+'</table>'}
async function setReviewStatus(id,status){const note=prompt("处理说明：","");if(note===null)return;try{await api(`/api/tlc-batches/${selected.id}/review/links/${id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({review_status:status,operator:createdBy.value||selected.created_by,note})});selected=await api(`/api/tlc-batches/${selected.id}`);await loadBatches();await refreshReviewLinks()}catch(e){alert(e.message)}}
async function registerLedgerLink(){
 if(!selected){alert("请先选择Batch");return}
 const reviews=await api(`/api/tlc-batches/${selected.id}/review/links`);
 if(!reviews.length){alert("当前 Batch 没有待审核关联");return}
 const review=reviews.find(r=>r.review_status==="APPROVED"||r.review_status==="POSTED")||reviews[0];
 const ledgerId=prompt("请输入正式销售台账 ID：","");
 if(!ledgerId)return;
 try{
  const result=await api(`/api/tlc-batches/${selected.id}/sales-ledger/links`,{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({
    review_link_id:review.id,
    sales_ledger_id:ledgerId,
    posted_by:createdBy.value||selected.created_by,
    note:"Registered from Batch Center"
   })
  });
  alert(result.status==="exists"?"该台账已登记":"台账登记成功");
  selected=await api(`/api/tlc-batches/${selected.id}`);
  await loadBatches();
  await refreshLedgerLinks();
 }catch(e){alert(e.message)}
}
async function refreshLedgerLinks(){
 if(!selected)return;
 const [summary,rows]=await Promise.all([
  api(`/api/tlc-batches/${selected.id}/sales-ledger/summary`),
  api(`/api/tlc-batches/${selected.id}/sales-ledger/links`)
 ]);
 const summaryDiv=document.getElementById("ledgerSummary");
 const listDiv=document.getElementById("ledgerLinks");
 if(!summaryDiv)return;
 summaryDiv.textContent=`Ledger Count=${summary.ledger_count}, Latest Posted=${summary.latest_posted_at||"-"}`;
 listDiv.innerHTML='<table><tr><th>请求书</th><th>Pending Review ID</th><th>Sales Ledger ID</th><th>登记人</th><th>登记时间</th></tr>'+
 rows.map(r=>`<tr><td>${esc(r.request_no)}</td><td>${esc(r.pending_review_id)}</td><td>${esc(r.sales_ledger_id)}</td><td>${esc(r.posted_by)}</td><td>${esc(r.posted_at)}</td></tr>`).join("")+
 '</table>';
}
async function registerBankLink(){if(!selected){alert("请先选择Batch");return}const bankTransactionId=prompt("请输入银行流水记录 ID：","");if(!bankTransactionId)return;const transactionId=prompt("请输入银行流水编号：","")||"";const transactionDate=prompt("请输入交易日期 YYYY-MM-DD：","")||"";const direction=(prompt("请输入方向 CREDIT / DEBIT：","CREDIT")||"CREDIT").toUpperCase();const amount=prompt("请输入金额：","0")||"0";const counterparty=prompt("请输入对方名称：","")||"";try{const result=await api(`/api/tlc-batches/${selected.id}/bank/links`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({bank_transaction_id:bankTransactionId,transaction_id:transactionId,transaction_date:transactionDate,direction,amount,counterparty,linked_by:createdBy.value||selected.created_by,note:"Registered from Batch Center"})});alert(result.status==="exists"?"该流水已登记":"银行流水登记成功");selected=await api(`/api/tlc-batches/${selected.id}`);await loadBatches();await refreshBankLinks()}catch(e){alert(e.message)}}
async function refreshBankLinks(){if(!selected)return;const [summary,rows]=await Promise.all([api(`/api/tlc-batches/${selected.id}/bank/summary`),api(`/api/tlc-batches/${selected.id}/bank/links`)]);const s=document.getElementById("bankSummary");const d=document.getElementById("bankLinks");if(!s)return;s.textContent=`Transactions=${summary.transaction_count}, Credit=${summary.credit_total}, Debit=${summary.debit_total}`;d.innerHTML='<table><tr><th>日期</th><th>银行流水ID</th><th>方向</th><th>金额</th><th>对方</th><th>登记人</th></tr>'+rows.map(r=>`<tr><td>${esc(r.transaction_date)}</td><td>${esc(r.transaction_id||r.bank_transaction_id)}</td><td>${esc(r.direction)}</td><td>${esc(r.amount)}</td><td>${esc(r.counterparty)}</td><td>${esc(r.linked_by)}</td></tr>`).join("")+'</table>'}
async function registerReconciliationLink(){
 if(!selected){alert("请先选择Batch");return}
 const reconciliationId=prompt("请输入对账记录 ID：","");
 if(!reconciliationId)return;
 const customerId=prompt("请输入 Customer ID：","");
 if(!customerId)return;
 const status=(prompt("请输入对账状态 SETTLED / PARTIAL / UNPAID / OVERPAID / NO_ACTIVITY：","SETTLED")||"SETTLED").toUpperCase();
 const closing=prompt("请输入期末未付金额：","0")||"0";
 try{
  const result=await api(`/api/tlc-batches/${selected.id}/reconciliation/links`,{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({
    reconciliation_id:reconciliationId,
    customer_id:customerId,
    reconciliation_status:status,
    closing_outstanding:closing,
    linked_by:createdBy.value||selected.created_by,
    note:"Registered from Batch Center"
   })
  });
  alert(result.status==="exists"?"该对账结果已登记":"对账结果登记成功");
  selected=await api(`/api/tlc-batches/${selected.id}`);
  await loadBatches();
  await refreshReconciliationLinks();
 }catch(e){alert(e.message)}
}
async function refreshReconciliationLinks(){
 if(!selected)return;
 const [summary,rows]=await Promise.all([
  api(`/api/tlc-batches/${selected.id}/reconciliation/summary`),
  api(`/api/tlc-batches/${selected.id}/reconciliation/links`)
 ]);
 const summaryDiv=document.getElementById("reconciliationSummary");
 const linksDiv=document.getElementById("reconciliationLinks");
 if(!summaryDiv||!linksDiv)return;
 summaryDiv.textContent=`Reconciliations=${summary.reconciliation_count}, Settled=${summary.settled_count}, Open=${summary.open_count}`;
 linksDiv.innerHTML='<table><tr><th>客户</th><th>对账ID</th><th>销售</th><th>入金</th><th>期末未付</th><th>状态</th></tr>'+rows.map(r=>`<tr><td>${esc(r.customer_id)}</td><td>${esc(r.reconciliation_id)}</td><td>${esc(r.period_sales_total)}</td><td>${esc(r.period_payment_total)}</td><td>${esc(r.closing_outstanding)}</td><td>${esc(r.reconciliation_status)}</td></tr>`).join("")+'</table>';
}
async function finishReconciliationBatch(){
 if(!selected||!confirm("确认完成此 Batch？"))return;
 try{
  selected=await api(`/api/tlc-batches/${selected.id}/reconciliation/finish`,{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({operator:createdBy.value||selected.created_by})
  });
  await loadBatches();
  await refreshReconciliationLinks();
  alert("Batch 已完成");
 }catch(e){alert(e.message)}
}
async function refreshLifecycleOverview(){
 if(!selected)return;
 const [overview,timeline]=await Promise.all([
  api(`/api/tlc-batches/${selected.id}/lifecycle-overview`),
  api(`/api/tlc-batches/${selected.id}/lifecycle-timeline`)
 ]);
 const progress=document.getElementById("lifecycleProgress");
 const checks=document.getElementById("lifecycleChecks");
 const timelineDiv=document.getElementById("lifecycleTimeline");
 if(!progress)return;
 progress.textContent=`Completion ${overview.completion_percent}% (${overview.completed_step_count}/${overview.total_step_count}) / Batch Status=${overview.batch.status}`;
 checks.innerHTML='<table><tr><th>阶段</th><th>完成</th><th>说明</th></tr>'+
  overview.checks.map(x=>`<tr><td>${esc(x.step)}</td><td>${x.complete?"YES":"NO"}</td><td>${esc(x.detail)}</td></tr>`).join("")+
  '</table>';
 timelineDiv.innerHTML='<table><tr><th>时间</th><th>事件</th><th>状态</th><th>操作人</th><th>说明</th></tr>'+
  timeline.map(x=>`<tr><td>${esc(x.event_at)}</td><td>${esc(x.event_type)}</td><td>${esc(x.old_status)} -> ${esc(x.new_status)}</td><td>${esc(x.operator)}</td><td>${esc(x.message)}</td></tr>`).join("")+
  '</table>';
}
async function runCompare(){if(!selected){alert("请先选择Batch");return}const r=await api(`/api/tlc-batches/${selected.id}/compare`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({compared_by:createdBy.value||selected.created_by})});alert(r.status==="exists"?"当前文件版本已比较":"比较完成");selected=await api(`/api/tlc-batches/${selected.id}`);await loadBatches();await refreshCompare()}
async function refreshCompare(){if(!selected)return;const [x,h]=await Promise.all([api(`/api/tlc-batches/${selected.id}/compare/latest`),api(`/api/tlc-batches/${selected.id}/compare/history`)]);if(!x.id){compareSummary.textContent="尚未执行比较";compareDetails.innerHTML=""}else{compareSummary.textContent=x.matched?`MATCHED / ${x.request_no}`:`ERROR / Differences: ${x.difference_count}`;const d=(x.result&&x.result.differences)||[];compareDetails.innerHTML='<table><tr><th>字段</th><th>Excel</th><th>PDF</th><th>说明</th></tr>'+d.map(v=>`<tr><td>${esc(v.field)}</td><td>${esc(v.excel_value)}</td><td>${esc(v.pdf_value)}</td><td>${esc(v.message)}</td></tr>`).join("")+'</table>'}compareHistory.innerHTML='<table><tr><th>时间</th><th>请求书</th><th>结果</th><th>差异数</th></tr>'+h.map(v=>`<tr><td>${esc(v.compared_at)}</td><td>${esc(v.request_no)}</td><td>${v.matched?"MATCHED":"ERROR"}</td><td>${v.difference_count}</td></tr>`).join("")+'</table>'}
loadBatches().then(newBatch).catch(e=>alert(e.message));
</script></body></html>
