<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>请求书批量核对与 Review</title>
<style>
body{font-family:Arial,"Microsoft YaHei";margin:0;background:#f4f6f8;color:#222}
header{background:#203b55;color:#fff;padding:18px 24px}
main{padding:16px;max-width:1500px;margin:auto}
.card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:14px;margin-bottom:12px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:end}
label{display:flex;flex-direction:column;font-size:12px;gap:4px}
input,select,button,textarea{padding:8px;border:1px solid #bbb;border-radius:4px}
button{cursor:pointer}.primary{background:#203b55;color:#fff}.run{background:#2563eb;color:#fff}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{border:1px solid #ddd;padding:7px;text-align:left;vertical-align:top}
th{background:#edf2f7}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mono{white-space:pre-wrap;font-family:Consolas,monospace;max-height:260px;overflow:auto}
.small{font-size:12px;color:#555}.status{padding:4px 9px;border-radius:999px;background:#eef2f7}
.summary{display:grid;grid-template-columns:repeat(5,minmax(100px,1fr));gap:8px;margin-top:10px}
.metric{padding:10px;border:1px solid #ddd;border-radius:6px;background:#f8fafc}
.metric b{display:block;font-size:20px}.sep{border:0;border-top:2px solid #cbd5e1;margin:22px 0}.batch-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:end;margin-bottom:10px}.batch-actions label{min-width:180px}.batch-actions textarea{min-width:300px}
@media(max-width:900px){.grid{grid-template-columns:1fr}.summary{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header>
<h1>请求书批量核对、初步导入与 Review</h1>
<div>上部执行 Batch；下部处理 WAIT_REVIEW。</div>
</header>
<main>
<!-- BUILD037_S05_UNIFIED_BATCH_REVIEW -->
<section class="card">
<h2>1. 请求书批量核对与初步导入 <span id="batchStatus" class="status">未执行</span></h2>
<div class="toolbar">
<label>业务年月（YYYYMM）<input id="batchMonth"></label>
<label>操作人<input id="batchOperator"></label>
<button class="run" id="runBtn" onclick="runBatch()">执行 Batch</button>
<button onclick="loadBatch()">刷新 Batch</button>
<button onclick="syncMonth()">同步到 Review</button>
</div>
<div id="batchMsg" class="small" style="margin-top:10px">请输入业务年月和操作人。</div>
<div id="batchSummary" class="summary"></div>
</section>

<section class="card">
<h3>Batch Review Queue 预览</h3>
<div id="batchQueue">暂无数据。</div>
</section>

<hr class="sep">

<section class="card">
<h2>2. 请求书 Review <span id="reviewCount" class="status">0件</span></h2>
<div class="toolbar">
<label>业务年月<input id="reviewMonth"></label>
<label>Review 状态<select id="reviewStatus"><option>WAIT_REVIEW</option><option value="">全部</option><option>REVIEWED_OK</option><option>SOURCE_CORRECTION_REQUIRED</option><option>ON_HOLD</option></select></label>
<label>Compare<select id="reviewCompare"><option value="">全部</option><option>MATCHED</option><option>EXCEPTION</option><option>ERROR</option></select></label>
<label>客户匹配<select id="reviewCustomer"><option value="">全部</option><option>MATCHED</option><option>UNMATCHED</option></select></label>
<label>关键词<input id="reviewKeyword"></label>
<label style="flex-direction:row;align-items:center;gap:6px"><input id="latestBatchOnly" type="checkbox" checked onchange="loadReviews()">仅本次 Batch</label>
<button class="primary" onclick="loadReviews()">查询</button>
</div>
</section>

<section class="card"><div class="batch-actions">
<label>批量操作人<input id="bulkOperator"></label>
<label>批量意见<textarea id="bulkComment" rows="2"></textarea></label>
<button onclick="bulkDecide('REVIEWED_OK',false)">批量核对通过</button>
<button onclick="bulkDecide('REVIEWED_OK',true)">批量强制通过</button>
<button onclick="bulkDecide('SOURCE_CORRECTION_REQUIRED',false)">批量需要修正原始文件</button>
<button onclick="bulkDecide('ON_HOLD',false)">批量暂缓处理</button>
<span id="selectedCount" class="status">已选择 0 件</span>
</div><div id="reviewRows"></div></section>

<section class="grid">
<div class="card" style="background:#eee"><h3>原始数据（只读）</h3><div id="raw">请选择一条记录。</div></div>
<div class="card"><h3>系统数据与 Review</h3><div id="system">请选择一条记录。</div></div>
</section>
</main>

<script>
const batchApi="/api/tlc-request-batch-compare-import";
const reviewApi="/api/tlc-request-reviews";
let selected=null;let selectedIds=new Set();let activeBatchId="";let batchRunning=false;
const $=id=>document.getElementById(id);
const esc=v=>String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
async function jf(u,o={}){const r=await fetch(u,o);let b;try{b=await r.json()}catch(e){b=await r.text()}if(!r.ok)throw new Error(b.detail||String(b));return b}
function monthOk(v){return /^\d{6}$/.test(v)}
function syncMonth(){$("reviewMonth").value=$("batchMonth").value.trim();loadReviews()}
function batchMetrics(b={}){$("batchSummary").innerHTML=[
["文件",b.total_file_count||0],["配对",b.pair_count||0],["待Review",b.review_count||0],
["异常",b.exception_count||0],["错误",b.error_count||0]
].map(x=>`<div class="metric">${x[0]}<b>${esc(x[1])}</b></div>`).join("")}
async function runBatch(){
 if(batchRunning)return;
 const m=$("batchMonth").value.trim(),op=$("batchOperator").value.trim();
 if(!monthOk(m)){alert("请输入6位业务年月");return}
 if(!op){alert("请输入操作人");return}
 const btn=$("runBtn"),oldText=btn.textContent;
 batchRunning=true;btn.disabled=true;btn.textContent="执行中...";
 $("batchStatus").textContent="执行中";
 try{
  const result=await jf(batchApi+"/run",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({business_month:m,operator:op})});
  activeBatchId=result.id||result.batch_id||"";
  $("reviewMonth").value=m;
  await loadBatch();
  await loadReviews();
 }catch(e){
  $("batchStatus").textContent="失败";
  $("batchMsg").textContent=e.message;
  alert(e.message);
 }finally{
  batchRunning=false;
  btn.disabled=false;
  btn.textContent=oldText;
 }
}
async function loadBatch(){
 const m=$("batchMonth").value.trim();
 if(!monthOk(m)){batchMetrics();return}
 try{
  const b=await jf(batchApi+"/latest?business_month="+encodeURIComponent(m));
  activeBatchId=b.id||b.batch_id||activeBatchId;
  $("batchStatus").textContent=b.status||"无记录";
  $("batchMsg").innerHTML=`异常文件：${esc(b.exception_report_path||"无")}<br>${esc(b.message||"")}`;
  batchMetrics(b||{});
  const rows=await jf(batchApi+"/review-queue?business_month="+encodeURIComponent(m));
  $("batchQueue").innerHTML=rows.length?`<table><tr><th>Pair Key</th><th>核对</th><th>原始客户</th><th>系统客户</th><th>异常</th></tr>${rows.map(x=>`<tr><td>${esc(x.pair_key)}</td><td>${esc(x.compare_status)}</td><td>${esc(x.raw_customer_name)}</td><td>${esc(x.system_customer_code)} ${esc(x.system_customer_name)}</td><td>${esc(x.exception_codes)}</td></tr>`).join("")}</table>`:"当前月份无数据。";
 }catch(e){$("batchMsg").textContent="读取失败："+e.message}
}
async function loadReviews(){
 const q=new URLSearchParams({
  business_month:$("reviewMonth").value.trim(),
  batch_id:$("latestBatchOnly").checked?activeBatchId:"",
  review_status:$("reviewStatus").value,
  compare_status:$("reviewCompare").value,
  customer_match_status:$("reviewCustomer").value,
  keyword:$("reviewKeyword").value.trim()
 });
 try{
  const data=await jf(reviewApi+"?"+q);$("reviewCount").textContent=data.length+"件";
  selectedIds.clear();updateSelectedCount();
  $("reviewRows").innerHTML=data.length?`<table><tr><th class="tlc-row-no">No</th><th class="tlc-row-check"><input type="checkbox" id="selectAllReviews" onclick="event.stopPropagation()" onchange="toggleAllReviews(this.checked)"></th><th>年月</th><th>PDF / Excel</th><th>原始客户</th><th>系统客户</th><th>Compare</th><th>异常</th><th>Review</th></tr>${data.map((x,i)=>`<tr onclick="showReview('${esc(x.id)}')" style="cursor:pointer"><td class="tlc-row-no">${i+1}</td><td class="tlc-row-check"><input type="checkbox" class="review-select" value="${esc(x.id)}" onclick="event.stopPropagation()" onchange="toggleReview('${esc(x.id)}',this.checked)"></td><td>${esc(x.business_month)}</td><td>${esc(x.pdf_file_name)}<br>${esc(x.excel_file_name)}</td><td>${esc(x.raw_customer_name)}</td><td>${esc(x.system_customer_code)}<br>${esc(x.system_customer_name)}</td><td>${esc(x.compare_status)}</td><td>${esc(x.exception_codes)}</td><td>${esc(x.review_status)}</td></tr>`).join("")}</table>`:"当前条件没有 Review 数据。";
 }catch(e){$("reviewRows").textContent="读取 Review 失败："+e.message}
}
function updateSelectedCount(){$("selectedCount").textContent="已选择 "+selectedIds.size+" 件";}
function toggleReview(id,checked){if(checked)selectedIds.add(id);else selectedIds.delete(id);updateSelectedCount();}
function toggleAllReviews(checked){document.querySelectorAll(".review-select").forEach(box=>{box.checked=checked;if(checked)selectedIds.add(box.value);else selectedIds.delete(box.value)});updateSelectedCount();}
async function bulkDecide(status,forced){
 const ids=[...selectedIds];if(!ids.length){alert("请先勾选需要处理的请求书");return}
 const operator=$("bulkOperator").value.trim(),comment=$("bulkComment").value.trim();
 if(!operator){alert("请输入批量操作人");return}
 if((forced||status==="SOURCE_CORRECTION_REQUIRED"||status==="ON_HOLD")&&!comment){alert("该操作需要填写批量意见");return}
 if(!confirm("确认批量处理 "+ids.length+" 件请求书吗？"))return;
 try{const result=await jf(reviewApi+"/batch",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({review_ids:ids,review_status:status,operator:operator,comment:comment,forced:forced})});alert("批量处理完成："+result.count+" 件");selectedIds.clear();updateSelectedCount();await loadReviews();await loadBatch();$("raw").textContent="批量处理完成。";$("system").textContent="批量处理完成。";selected=null}catch(e){alert(e.message)}
}
async function showReview(id){
 selected=await jf(reviewApi+"/"+id);
 $("raw").innerHTML=`<p><b>PDF：</b>${esc(selected.pdf_file_name)}<br><span class="small">${esc(selected.final_pdf_path)}</span></p><p><b>Excel：</b>${esc(selected.excel_file_name)}<br><span class="small">${esc(selected.final_excel_path)}</span></p><p><b>PDF Hash：</b>${esc(selected.pdf_sha256)}</p><p><b>Excel Hash：</b>${esc(selected.excel_sha256)}</p><p><b>原始客户：</b>${esc(selected.raw_customer_name)}</p><p><b>PDF 文本：</b></p><div class="mono">${esc(selected.pdf_raw_text)}</div><p><b>Excel 原始数据：</b></p><div class="mono">${esc(selected.excel_raw_json)}</div>`;
 $("system").innerHTML=`<p><b>系统客户：</b>${esc(selected.system_customer_code)} / ${esc(selected.system_customer_name)}</p><p><b>客户匹配：</b>${esc(selected.customer_match_status)}</p><p><b>Compare：</b>${esc(selected.compare_status)}</p><p><b>PDF 合计：</b>${esc(selected.pdf_total_amount)}　<b>Excel 合计：</b>${esc(selected.excel_total_amount)}</p><p><b>异常：</b>${esc(selected.exception_codes)}</p><div class="mono">${esc(selected.exception_details)}</div><hr><label>操作人<input id="operator"></label><label>意见<textarea id="comment" rows="3"></textarea></label><p><button onclick="decide('REVIEWED_OK',false)">核对通过</button> <button onclick="decide('REVIEWED_OK',true)">强制通过</button> <button onclick="decide('SOURCE_CORRECTION_REQUIRED',false)">需要修正原始文件</button> <button onclick="decide('ON_HOLD',false)">暂缓处理</button></p><button onclick="window.open('/tlc-customer-master','_blank')">打开客户维护</button>`;
}
async function decide(s,f){
 if(!selected)return;
 try{
  await jf(reviewApi+"/"+selected.id,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({review_status:s,operator:$("operator").value,comment:$("comment").value,forced:f})});
  await loadReviews();await loadBatch();$("raw").textContent="处理完成。";$("system").textContent="处理完成。";selected=null
 }catch(e){alert(e.message)}
}
(function init(){
 const d=new Date(),m=String(d.getFullYear())+String(d.getMonth()+1).padStart(2,"0");
 $("batchMonth").value=m;$("reviewMonth").value=m;batchMetrics();loadBatch().then(loadReviews)
})();
</script>
<script>
/* TLC_TABLE_ROW_SELECTOR_V1 */
(function(){
  const NUMBER_CLASS="tlc-row-no";
  const CHECK_CLASS="tlc-row-check";
  let scheduled=false;

  function headerRows(table){
    const explicit=[...table.querySelectorAll("thead tr")];
    if(explicit.length) return explicit;
    const first=[...table.querySelectorAll("tr")].find(row=>row.querySelector("th"));
    return first?[first]:[];
  }

  function dataRows(table,headers){
    const headerSet=new Set(headers);
    return [...table.querySelectorAll("tr")].filter(row=>{
      if(headerSet.has(row)) return false;
      if(row.querySelector("th") && !row.querySelector("td")) return false;
      return true;
    });
  }

  function addHeader(row){
    if(row.querySelector("."+NUMBER_CLASS)) return;

    const checkTh=document.createElement("th");
    checkTh.className=CHECK_CLASS;
    checkTh.style.width="38px";
    checkTh.style.textAlign="center";

    const all=document.createElement("input");
    all.type="checkbox";
    all.title="全选/取消全选";
    all.addEventListener("click",event=>event.stopPropagation());
    all.addEventListener("change",()=>{
      const table=row.closest("table");
      table.querySelectorAll("input.tlc-row-select").forEach(input=>{
        input.checked=all.checked;
      });
    });
    checkTh.appendChild(all);

    const noTh=document.createElement("th");
    noTh.className=NUMBER_CLASS;
    noTh.textContent="No";
    noTh.style.width="52px";
    noTh.style.textAlign="center";

    row.insertBefore(checkTh,row.firstChild);
    row.insertBefore(noTh,row.firstChild);
  }

  function addData(row,index){
    let no=row.querySelector(":scope > td."+NUMBER_CLASS);
    let check=row.querySelector(":scope > td."+CHECK_CLASS);

    if(!check){
      check=document.createElement("td");
      check.className=CHECK_CLASS;
      check.style.textAlign="center";
      const input=document.createElement("input");
      input.type="checkbox";
      input.className="tlc-row-select";
      input.addEventListener("click",event=>event.stopPropagation());
      check.appendChild(input);
      row.insertBefore(check,row.firstChild);
    }

    if(!no){
      no=document.createElement("td");
      no.className=NUMBER_CLASS;
      no.style.textAlign="center";
      row.insertBefore(no,row.firstChild);
    }

    no.textContent=String(index);
  }

  function enhance(table){
    const headers=headerRows(table);
    headers.forEach(addHeader);
    dataRows(table,headers).forEach((row,index)=>addData(row,index+1));
  }

  function run(){
    scheduled=false;
    document.querySelectorAll("table").forEach(enhance);
  }

  function schedule(){
    if(scheduled) return;
    scheduled=true;
    setTimeout(run,0);
  }

  if(document.readyState==="loading"){
    document.addEventListener("DOMContentLoaded",run,{once:true});
  }else{
    run();
  }

  new MutationObserver(schedule).observe(document.documentElement,{
    childList:true,
    subtree:true
  });
})();
</script>
</body>
</html>
