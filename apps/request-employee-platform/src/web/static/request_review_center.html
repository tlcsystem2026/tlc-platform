<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>请求书 Review</title>
<style>body{font-family:Arial,"Microsoft YaHei";margin:0;background:#f4f6f8;color:#222}header{background:#203b55;color:#fff;padding:18px 24px}main{padding:16px}.card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:14px;margin-bottom:12px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:end}label{display:flex;flex-direction:column;font-size:12px;gap:4px}input,select,button,textarea{padding:8px;border:1px solid #bbb;border-radius:4px}button{cursor:pointer}.primary{background:#203b55;color:#fff}table{width:100%;border-collapse:collapse;font-size:12px}th,td{border:1px solid #ddd;padding:7px;text-align:left;vertical-align:top}th{background:#edf2f7}.raw{background:#eee}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.mono{white-space:pre-wrap;font-family:Consolas,monospace;max-height:260px;overflow:auto}.small{font-size:12px;color:#555}</style></head>
<body><header><h1>请求书 Review</h1><div>原始数据只读；系统结果独立核查</div></header><main>
<section class="card"><div class="toolbar">
<label>业务年月<input id="month" placeholder="YYYYMM"></label>
<label>Review 状态<select id="status"><option>WAIT_REVIEW</option><option value="">全部</option><option>REVIEWED_OK</option><option>SOURCE_CORRECTION_REQUIRED</option><option>ON_HOLD</option></select></label>
<label>Compare<select id="compare"><option value="">全部</option><option>MATCHED</option><option>EXCEPTION</option><option>ERROR</option></select></label>
<label>客户匹配<select id="customerStatus"><option value="">全部</option><option>MATCHED</option><option>UNMATCHED</option></select></label>
<label>关键词<input id="keyword"></label><button class="primary" onclick="loadRows()">查询</button>
</div></section>
<section class="card"><div id="rows"></div></section>
<section class="grid">
<div class="card raw"><h3>原始数据（只读）</h3><div id="raw">请选择一条记录。</div></div>
<div class="card"><h3>系统数据与 Review</h3><div id="system">请选择一条记录。</div></div>
</section></main>
<script>
const api="/api/tlc-request-reviews";let selected=null;
async function jf(u,o={}){const r=await fetch(u,o);let b;try{b=await r.json()}catch(e){b=await r.text()}if(!r.ok)throw new Error(b.detail||String(b));return b}
function e(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
async function loadRows(){const q=new URLSearchParams({business_month:month.value.trim(),review_status:status.value,compare_status:compare.value,customer_match_status:customerStatus.value,keyword:keyword.value.trim()});const data=await jf(api+"?"+q);rows.innerHTML='<table><tr><th>年月</th><th>PDF / Excel</th><th>原始客户</th><th>系统客户</th><th>Compare</th><th>异常</th><th>Review</th></tr>'+data.map(x=>`<tr onclick="show('${x.id}')" style="cursor:pointer"><td>${e(x.business_month)}</td><td>${e(x.pdf_file_name)}<br>${e(x.excel_file_name)}</td><td>${e(x.raw_customer_name)}</td><td>${e(x.system_customer_code)}<br>${e(x.system_customer_name)}</td><td>${e(x.compare_status)}</td><td>${e(x.exception_codes)}</td><td>${e(x.review_status)}</td></tr>`).join("")+'</table>'}
async function show(id){selected=await jf(api+"/"+id);raw.innerHTML=`<p><b>PDF：</b>${e(selected.pdf_file_name)}<br><span class="small">${e(selected.final_pdf_path)}</span></p><p><b>Excel：</b>${e(selected.excel_file_name)}<br><span class="small">${e(selected.final_excel_path)}</span></p><p><b>PDF Hash：</b>${e(selected.pdf_sha256)}</p><p><b>Excel Hash：</b>${e(selected.excel_sha256)}</p><p><b>原始客户名称：</b>${e(selected.raw_customer_name)}</p><p><b>PDF 提取文本：</b></p><div class="mono">${e(selected.pdf_raw_text)}</div><p><b>Excel 原始数据：</b></p><div class="mono">${e(selected.excel_raw_json)}</div>`;system.innerHTML=`<p><b>系统客户：</b>${e(selected.system_customer_code)} / ${e(selected.system_customer_name)}</p><p><b>客户匹配：</b>${e(selected.customer_match_status)}</p><p><b>Compare：</b>${e(selected.compare_status)}</p><p><b>PDF 合计：</b>${e(selected.pdf_total_amount)}　<b>Excel 合计：</b>${e(selected.excel_total_amount)}</p><p><b>异常代码：</b>${e(selected.exception_codes)}</p><div class="mono">${e(selected.exception_details)}</div><hr><label>操作人<input id="operator"></label><label>意见<textarea id="comment" rows="3"></textarea></label><p><button onclick="decide('REVIEWED_OK',false)">核对通过</button> <button onclick="decide('REVIEWED_OK',true)">强制通过</button> <button onclick="decide('SOURCE_CORRECTION_REQUIRED',false)">需要修正原始文件</button> <button onclick="decide('ON_HOLD',false)">暂缓处理</button></p><p><button onclick="window.open('/tlc-customer-master','_blank')">打开客户维护</button> <button disabled title="客户维护页面确认后接入">重新匹配客户</button></p>`}
async function decide(s,f){if(!selected)return;try{await jf(api+"/"+selected.id,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({review_status:s,operator:operator.value,comment:comment.value,forced:f})});await loadRows();raw.innerHTML="处理完成。";system.innerHTML="处理完成。";selected=null}catch(err){alert(err.message)}}
loadRows();
</script></body></html>
