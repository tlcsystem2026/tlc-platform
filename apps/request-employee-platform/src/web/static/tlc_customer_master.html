<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="tlc-build-marker" content="BUILD037_CUSTOMER_TODOKEDL_R1">
<title>客户 Master</title>
<style>
body{font-family:"Microsoft YaHei","Yu Gothic",sans-serif;margin:0;background:#f6f7f9;color:#222}header{background:#1f4e78;color:#fff;padding:16px 22px}header h1{margin:0 0 6px}main{padding:16px}.layout{display:grid;grid-template-columns:400px 1fr;gap:14px}.panel{background:#fff;border:1px solid #ddd;border-radius:8px;padding:14px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center}input,select,textarea,button{padding:8px;border:1px solid #bbb;border-radius:4px}button{cursor:pointer}.primary{background:#1f4e78;color:#fff}.success{background:#287a3f;color:#fff}.list{max-height:72vh;overflow:auto;border:1px solid #ddd}.item{padding:10px;border-bottom:1px solid #eee;cursor:pointer}.item:hover,.item.active{background:#eaf2fb}.grid{display:grid;grid-template-columns:repeat(2,minmax(180px,1fr));gap:10px}label{display:flex;flex-direction:column;gap:4px;font-size:13px}textarea{min-height:80px}.small{font-size:12px;color:#666}.message{padding:9px;border-radius:4px;margin-bottom:10px;display:none}.message.ok{display:block;background:#e8f5eb;color:#195f2d}.message.error{display:block;background:#fdeaea;color:#8a1f1f}.navlink{color:#fff;margin-right:14px}.count{font-size:12px;color:#555;margin-left:auto}.delivery{grid-column:1/-1;border-top:1px solid #ddd;margin-top:4px;padding-top:10px;font-weight:bold}@media(max-width:900px){.layout{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}
</style></head>
<body><header><h1>客户 Master</h1><div>客户正式名称、别名与配送目的地资料维护</div><div style="margin-top:8px"><a class="navlink" href="/dashboard">返回 Dashboard</a><a class="navlink" href="/request-review-center">请求书 Review</a></div></header>
<main><div id="message" class="message"></div><div class="layout">
<section class="panel"><div class="toolbar"><input id="query" placeholder="Customer ID / 名称 / 配送名"><select id="searchStatus"><option value="">全部状态</option></select><button onclick="loadRecords()">检索</button><button class="primary" onclick="newRecord()">新增</button><span id="recordCount" class="count"></span></div>
<div class="toolbar"><button class="success" onclick="chooseTodokedlImport()">TODOKEDL CSV 导入</button><button onclick="exportCsv()">CSV 导出</button><input id="todokedlFile" type="file" accept=".csv,text/csv" hidden onchange="importTodokedl(this.files[0])"></div>
<div class="small">TODOKEDL 导入以「お届け先コード」为唯一键，只更新短カナ与配送名称；不会覆盖客户正式名、正式カナ、别名、状态或备注。支持 UTF-8 与 CP932/Shift-JIS。</div><div id="recordList" class="list"></div></section>
<section class="panel"><div class="toolbar"><button class="primary" onclick="saveRecord()">保存</button></div><input id="recordId" type="hidden"><div class="grid">
<label>Customer ID<input id="customerId"></label><label>启用<input id="active" type="checkbox" checked></label>
<label>客户正式名全称 formal_name<input id="formalName"></label><label>状态<select id="statusCode"></select></label>
<label>客户正式名平假名<input id="hiraganaName"></label><label>客户正式名カナ katakana_name<input id="katakanaName"></label>
<label>略称<input id="shortName"></label><label>别名1<input id="alias1"></label><label>别名2<input id="alias2"></label><label>别名3<input id="alias3"></label><label>别名4<input id="alias4"></label><label>别名5<input id="alias5"></label>
<div class="delivery">TODOKEDL 配送资料（不替代正式客户名称）</div>
<label>カナ名称 katakana_name_short<input id="katakanaNameShort"></label><label>お届け先名称１ delivery_name_1<input id="deliveryName1"></label><label>お届け先名称２ delivery_name_2<input id="deliveryName2"></label>
<label style="grid-column:1/-1">备注<textarea id="note"></textarea></label></div></section></div></main>
<script>
const IDS={customer_id:"customerId",formal_name:"formalName",hiragana_name:"hiraganaName",katakana_name:"katakanaName",katakana_name_short:"katakanaNameShort",delivery_name_1:"deliveryName1",delivery_name_2:"deliveryName2",short_name:"shortName",alias_1:"alias1",alias_2:"alias2",alias_3:"alias3",alias_4:"alias4",alias_5:"alias5",status_code:"statusCode",note:"note"};let records=[];
function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}function msg(t,e=false){const x=document.getElementById("message");x.textContent=t;x.className="message "+(e?"error":"ok")}
async function api(url,opt){const r=await fetch(url,opt),t=await r.text();let b;try{b=JSON.parse(t)}catch{b=t}if(!r.ok)throw new Error((b&&b.detail)||t||r.statusText);return b}
async function loadStatus(){let v=await api("/api/tlc-codes/values?category_code=CUSTOMER_STATUS");if(!v.length)v=[{code:"ACTIVE",name_zh:"启用"},{code:"INACTIVE",name_zh:"停用"}];for(const id of ["statusCode","searchStatus"]){const s=document.getElementById(id);s.innerHTML=id==="searchStatus"?'<option value="">全部状态</option>':"";v.forEach(x=>{const o=document.createElement("option");o.value=x.code;o.textContent=`${x.code} / ${x.name_zh||x.name_ja||x.name_en||""}`;s.appendChild(o)})}}
async function loadRecords(){const p=new URLSearchParams(),q=query.value.trim(),st=searchStatus.value;if(q)p.set("query",q);if(st)p.set("status_code",st);records=await api("/api/tlc-customers?"+p);recordList.innerHTML="";records.forEach(r=>{const d=document.createElement("div");d.className="item";d.innerHTML=`<strong>${esc(r.customer_id)}</strong><br>${esc(r.formal_name||"（正式名称待维护）")}<br><span class="small">配送: ${esc(r.delivery_name_1||"")} ${esc(r.delivery_name_2||"")}</span>`;d.onclick=()=>selectRecord(r,d);recordList.appendChild(d)});recordCount.textContent=`${records.length} 件`}
function selectRecord(r,n){document.querySelectorAll(".item.active").forEach(x=>x.classList.remove("active"));if(n)n.classList.add("active");recordId.value=r.id;Object.entries(IDS).forEach(([f,id])=>document.getElementById(id).value=r[f]||"");active.checked=!!r.active}
function newRecord(){recordId.value="";Object.values(IDS).forEach(id=>document.getElementById(id).value="");statusCode.value="ACTIVE";active.checked=true}
async function saveRecord(){const p={id:recordId.value,active:active.checked};Object.entries(IDS).forEach(([f,id])=>p[f]=document.getElementById(id).value);try{await api("/api/tlc-customers",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(p)});msg("保存成功");await loadRecords()}catch(e){msg(e.message,true)}}
function chooseTodokedlImport(){todokedlFile.click()}function bytesToBase64(bytes){let s="";for(let i=0;i<bytes.length;i+=32768)s+=String.fromCharCode(...bytes.subarray(i,i+32768));return btoa(s)}
async function importTodokedl(file){if(!file)return;try{const content_base64=bytesToBase64(new Uint8Array(await file.arrayBuffer()));const r=await api("/api/tlc-customers/import-todokedl",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({content_base64})});msg(`导入成功：${r.imported} 件（新增 ${r.created}、更新 ${r.updated}、跳过 ${r.skipped}）`);await loadRecords()}catch(e){msg(e.message,true)}finally{todokedlFile.value=""}}
function exportCsv(){const p=new URLSearchParams(),q=query.value.trim(),st=searchStatus.value;if(q)p.set("query",q);if(st)p.set("status_code",st);location.href="/api/tlc-customers/export.csv?"+p}
Promise.all([loadStatus(),loadRecords()]).catch(e=>msg(e.message,true));
</script><!-- BUILD037_STEP05_CUSTOMER_PAGE -->
<div id="build037-step05-contract" style="display:none">
客户维护
CSV 导入
CSV 导出
别名5
/api/tlc-customers/import
/api/tlc-customers/export.csv
</div>
</body></html>
