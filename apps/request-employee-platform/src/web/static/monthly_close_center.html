<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Monthly Close Control Center</title>
<style>
body{font-family:Arial,"Microsoft YaHei",sans-serif;margin:0;background:#f4f6f8;color:#222}
header{background:#264f73;color:#fff;padding:18px 24px}
main{padding:18px}.card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:14px;margin-bottom:14px}
.toolbar{display:flex;gap:8px;align-items:end;flex-wrap:wrap}
label{display:flex;flex-direction:column;gap:4px;font-size:13px}
input,button{padding:8px;border:1px solid #bbb;border-radius:4px}
button{cursor:pointer}.primary{background:#264f73;color:#fff}
.stats{display:grid;grid-template-columns:repeat(4,minmax(140px,1fr));gap:10px}
.stat{background:#eef3f7;border-radius:6px;padding:12px;text-align:center}
.good{color:#137333}.bad{color:#b3261e}
table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid #ddd;padding:7px;text-align:left}th{background:#eef3f7}
.small{font-size:12px;color:#666}
@media(max-width:900px){.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header>
<h1>Monthly Close Control Center</h1>
<div>按年月集中检查导入、比较、审核、销售台账、银行流水及客户对账完成情况</div>
</header>
<main>
<section class="card">
<div class="toolbar">
<label>业务年月
<input id="businessMonth" type="month">
</label>
<button class="primary" onclick="loadOverview()">检查月结状态</button>
<button onclick="window.open('/batch-center','_blank')">打开 Batch Center</button>
<button onclick="window.open('/import-center','_blank')">打开 Import Center</button>
</div>
</section>

<section class="card">
<div id="stats" class="stats"></div>
<div id="closeStatus" style="margin-top:12px"></div>
</section>

<section class="card">
<h3>Batch 明细</h3>
<div id="batchRows"></div>
</section>

<section class="card">
<h3>月结检查清单与签核</h3>
<div class="toolbar">
<label>操作人<input id="closeOperator"></label>
<button onclick="initializeChecklist()">初始化清单</button>
<button onclick="approveClose()">批准月结</button>
<button onclick="rejectClose()">驳回</button>
<button onclick="reopenClose()">重新打开</button>
</div>
<div id="monthlyChecklist"></div>
<div id="monthlySignoff" style="margin-top:10px"></div>
</section>

<section class="card">
<h3>跨月结转控制</h3>
<div class="toolbar">
<label>目标年月<input id="targetMonth" type="month"></label>
<button onclick="autoGenerateCarryForward()">从阻塞事项生成结转</button>
<button onclick="createManualCarryForward()">手工新增结转</button>
</div>
<div id="carryForwardSummary" class="small"></div>
<div id="carryForwardRows"></div>
</section>

<section class="card">
<h3>关闭 / 重开授权与审计</h3>
<div class="toolbar">
<button onclick="requestCloseAuthorization()">申请关闭</button>
<button onclick="requestReopenAuthorization()">申请重开</button>
</div>
<div id="authorizationRows"></div>
<h4>Audit Trail</h4>
<div id="authorizationAudit"></div>
</section>

<section class="card">
<h3>月结阻塞事项</h3>
<div id="blockers"></div>
</section>
</main>
<script>
async function api(url){
 const r=await fetch(url);
 let b;try{b=await r.json()}catch(e){b=await r.text()}
 if(!r.ok)throw new Error(b.detail||String(b));
 return b
}
function esc(v){
 return String(v??"").replace(/[&<>"']/g,c=>(
  {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]
 ))
}
async function loadControlView(){
 const month=businessMonth.value;
 if(!month)return;
 const data=await api(`/api/tlc-monthly-close/${month}/control-view`);
 const list=document.getElementById("monthlyChecklist");
 const sign=document.getElementById("monthlySignoff");
 if(!list)return;
 list.innerHTML=data.checklist_initialized
  ?'<table><tr><th>项目</th><th>状态</th><th>说明</th><th>操作</th></tr>'+
   data.checklist.map(x=>`<tr><td>${esc(x.item_name)}</td><td>${esc(x.status)}</td><td>${esc(x.note)}</td><td><button onclick="setChecklistItem('${x.id}','DONE')">完成</button> <button onclick="setChecklistItem('${x.id}','WAIVED')">豁免</button> <button onclick="setChecklistItem('${x.id}','PENDING')">恢复</button></td></tr>`).join("")+
   '</table>'
  :'<span class="small">尚未初始化月结检查清单</span>';
 sign.innerHTML=data.signoff
  ?`Sign-off: <b>${esc(data.signoff.status)}</b> / ${esc(data.signoff.signed_by)} ${esc(data.signoff.signed_at)}`
  :'<span class="small">尚未创建签核记录</span>';
}
async function initializeChecklist(){
 if(!businessMonth.value||!closeOperator.value.trim()){alert("请选择月份并输入操作人");return}
 const r=await fetch(`/api/tlc-monthly-close/${businessMonth.value}/checklist/initialize`,{
  method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({operator:closeOperator.value})
 });
 const b=await r.json();if(!r.ok)throw new Error(b.detail||"初始化失败");
 await loadControlView();
}
async function setChecklistItem(id,status){
 if(!closeOperator.value.trim()){alert("请输入操作人");return}
 const note=prompt("说明：","")||"";
 const r=await fetch(`/api/tlc-monthly-close/checklist/items/${id}`,{
  method:"PUT",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({status,operator:closeOperator.value,note})
 });
 const b=await r.json();if(!r.ok)throw new Error(b.detail||"更新失败");
 await loadControlView();
}
async function updateSignoff(status){
 if(!closeOperator.value.trim()){alert("请输入操作人");return}
 const note=prompt("签核说明：","")||"";
 const r=await fetch(`/api/tlc-monthly-close/${businessMonth.value}/signoff`,{
  method:"PUT",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({status,operator:closeOperator.value,note})
 });
 const b=await r.json();if(!r.ok)throw new Error(b.detail||"签核失败");
 await loadControlView();
}
async function approveClose(){await updateSignoff("APPROVED")}
async function rejectClose(){await updateSignoff("REJECTED")}
async function reopenClose(){await updateSignoff("REOPENED")}
async function loadCarryForwardView(){
 const month=businessMonth.value;if(!month)return;
 const data=await api(`/api/tlc-monthly-close/carry-forwards/control-view/${month}`);
 const summary=document.getElementById("carryForwardSummary");
 const rows=document.getElementById("carryForwardRows");if(!summary)return;
 summary.textContent=`Incoming Open=${data.incoming_open_count}, Outgoing Open=${data.outgoing_open_count}`;
 const all=[...data.incoming.map(x=>({...x,direction:"IN"})),...data.outgoing.map(x=>({...x,direction:"OUT"}))];
 rows.innerHTML='<table><tr><th>方向</th><th>来源月</th><th>目标月</th><th>分类</th><th>标题</th><th>金额</th><th>状态</th><th>操作</th></tr>'+
 all.map(x=>`<tr><td>${x.direction}</td><td>${esc(x.source_month)}</td><td>${esc(x.target_month)}</td><td>${esc(x.category)}</td><td>${esc(x.title)}</td><td>${esc(x.amount)} ${esc(x.currency)}</td><td>${esc(x.status)}</td><td><button onclick="updateCarryForward('${x.id}','CONFIRMED')">确认</button> <button onclick="updateCarryForward('${x.id}','RESOLVED')">解决</button> <button onclick="updateCarryForward('${x.id}','CANCELLED')">取消</button></td></tr>`).join("")+'</table>';
}
async function autoGenerateCarryForward(){
 if(!businessMonth.value||!targetMonth.value||!closeOperator.value.trim()){alert("请选择来源月、目标月并输入操作人");return}
 const r=await fetch("/api/tlc-monthly-close/carry-forwards/auto-generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({source_month:businessMonth.value,target_month:targetMonth.value,operator:closeOperator.value})});
 const b=await r.json();if(!r.ok)throw new Error(b.detail||"生成失败");
 alert(`新增 ${b.created_count}，已存在 ${b.existing_count}`);await loadCarryForwardView();
}
async function createManualCarryForward(){
 if(!businessMonth.value||!targetMonth.value||!closeOperator.value.trim()){alert("请选择来源月、目标月并输入操作人");return}
 const title=prompt("结转事项标题：","");if(!title)return;
 const category=prompt("分类：","MANUAL")||"MANUAL";const amount=prompt("金额：","0")||"0";
 const currency=prompt("币种：","JPY")||"JPY";const reason=prompt("原因：","")||"";
 const r=await fetch("/api/tlc-monthly-close/carry-forwards",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({source_month:businessMonth.value,target_month:targetMonth.value,category,title,amount,currency,reason,created_by:closeOperator.value,reference_id:`manual:${Date.now()}`})});
 const b=await r.json();if(!r.ok)throw new Error(b.detail||"创建失败");await loadCarryForwardView();
}
async function updateCarryForward(id,status){
 if(!closeOperator.value.trim()){alert("请输入操作人");return}
 const note=prompt("处理说明：","")||"";
 const r=await fetch(`/api/tlc-monthly-close/carry-forwards/${id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({status,operator:closeOperator.value,resolution_note:note})});
 const b=await r.json();if(!r.ok)throw new Error(b.detail||"更新失败");await loadCarryForwardView();
}
async function loadAuthorizationView(){
 const month=businessMonth.value;if(!month)return;
 const data=await api(`/api/tlc-monthly-close/authorizations/control-view/${month}`);
 const rows=document.getElementById("authorizationRows");
 const audit=document.getElementById("authorizationAudit");
 if(!rows)return;
 rows.innerHTML='<table><tr><th>动作</th><th>状态</th><th>申请人</th><th>审批人</th><th>执行人</th><th>操作</th></tr>'+
  data.authorizations.map(x=>`<tr><td>${esc(x.action)}</td><td>${esc(x.decision)}</td><td>${esc(x.requested_by)}</td><td>${esc(x.approved_by)}</td><td>${esc(x.executed_by)}</td><td>${x.decision==="PENDING"?`<button onclick="decideAuthorization('${x.id}','APPROVED')">批准</button> <button onclick="decideAuthorization('${x.id}','REJECTED')">驳回</button>`:""} ${x.decision==="APPROVED"?`<button onclick="executeAuthorization('${x.id}')">执行</button>`:""}</td></tr>`).join("")+
  '</table>';
 audit.innerHTML='<table><tr><th>时间</th><th>动作</th><th>事件</th><th>操作者</th><th>状态</th><th>说明</th></tr>'+
  data.audit.map(x=>`<tr><td>${esc(x.event_at)}</td><td>${esc(x.action)}</td><td>${esc(x.event_type)}</td><td>${esc(x.actor)}</td><td>${esc(x.old_status)} -> ${esc(x.new_status)}</td><td>${esc(x.message)}</td></tr>`).join("")+
  '</table>';
}
async function requestAuthorization(action){
 if(!businessMonth.value||!closeOperator.value.trim()){alert("请选择月份并输入操作人");return}
 const reason=prompt("申请理由：","")||"";
 const r=await fetch("/api/tlc-monthly-close/authorizations",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({business_month:businessMonth.value,action,requested_by:closeOperator.value,reason})});
 const b=await r.json();if(!r.ok)throw new Error(b.detail||"申请失败");
 await loadAuthorizationView();
}
async function requestCloseAuthorization(){await requestAuthorization("CLOSE")}
async function requestReopenAuthorization(){await requestAuthorization("REOPEN")}
async function decideAuthorization(id,decision){
 const approver=prompt("审批人：","")||"";
 if(!approver)return;
 const note=prompt("审批说明：","")||"";
 const r=await fetch(`/api/tlc-monthly-close/authorizations/${id}/decision`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({decision,approver,note})});
 const b=await r.json();if(!r.ok)throw new Error(b.detail||"审批失败");
 await loadAuthorizationView();
}
async function executeAuthorization(id){
 if(!closeOperator.value.trim()){alert("请输入操作人");return}
 const note=prompt("执行说明：","")||"";
 const r=await fetch(`/api/tlc-monthly-close/authorizations/${id}/execute`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({operator:closeOperator.value,note})});
 const b=await r.json();if(!r.ok)throw new Error(b.detail||"执行失败");
 await loadAuthorizationView();await loadControlView();
}
async function loadOverview(){
 const month=businessMonth.value;
 if(!month){alert("请选择业务年月");return}
 try{
  const data=await api(`/api/tlc-monthly-close/${month}`);
  stats.innerHTML=[
   ["Batch",data.batch_count],
   ["已完成",data.finished_batch_count],
   ["未完成",data.unfinished_batch_count],
   ["导入错误记录",data.import_error_record_count],
  ].map(x=>`<div class="stat"><b>${esc(x[1])}</b><br><span class="small">${esc(x[0])}</span></div>`).join("");

  closeStatus.innerHTML=data.close_ready
   ?'<b class="good">READY：本月满足关闭条件</b>'
   :'<b class="bad">BLOCKED：本月仍有未完成事项</b>';

  batchRows.innerHTML='<table><tr><th>Batch</th><th>状态</th><th>Import Jobs</th><th>Compare</th><th>Review</th><th>Sales Ledger</th><th>Bank</th><th>Reconciliation</th><th>阻塞</th></tr>'+
   data.batch_summaries.map(x=>`<tr>
    <td>${esc(x.batch.batch_no||x.batch.id)}<br><span class="small">${esc(x.batch.title)}</span></td>
    <td>${esc(x.batch.status)}</td><td>${x.import_job_count}</td><td>${x.compare_count}</td>
    <td>${x.review_count}</td><td>${x.sales_ledger_count}</td><td>${x.bank_count}</td>
    <td>${x.reconciliation_count}</td><td>${esc(x.blockers.join("; "))}</td>
   </tr>`).join("")+'</table>';

  blockers.innerHTML=data.blockers.length
   ?data.blockers.map(x=>`<div class="card"><b>${esc(x.batch_no||x.title||"Month")}</b><br>${x.items.map(esc).join("<br>")}</div>`).join("")
   :'<span class="good">没有阻塞事项</span>';
 }catch(e){alert(e.message)}
}
const now=new Date();
businessMonth.value=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
</script>
</body>
</html>
