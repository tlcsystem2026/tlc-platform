<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><title>销售数据一览</title><style>body{font-family:"Microsoft YaHei";background:#f6f8fb;margin:0}header{background:#059669;color:white;padding:22px 30px}.card{background:white;margin:18px;padding:18px;border-radius:14px}table{border-collapse:collapse;width:100%}td,th{border-bottom:1px solid #eee;padding:8px;text-align:left}</style></head><body><header><h1>销售数据一览</h1><p>一致请求书进入销售统计｜Build030</p></header><div class="card"><a href="/dashboard">返回仪表盘</a> | <a href="/docs">API文档</a></div><div class="card"><h2>统计</h2><pre id="summary">loading...</pre></div><div class="card"><h2>销售记录</h2><table><thead><tr><th>请求书编号</th><th>客户</th><th>日期</th><th>金额</th><th>状态</th></tr></thead><tbody id="rows"></tbody></table></div><script>async function load(){let s=await (await fetch('/api/sales/summary')).json();summary.textContent=JSON.stringify(s,null,2);let rs=await (await fetch('/api/sales')).json();rows.innerHTML=rs.map(x=>`<tr><td>${x.request_no}</td><td>${x.customer_name}</td><td>${x.sales_date}</td><td>${x.total_amount} ${x.currency}</td><td>${x.status}</td></tr>`).join('')}load()</script></body></html>
