<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TLC Code Master</title><style>body{font-family:Arial,"Microsoft YaHei",sans-serif;margin:0;background:#f5f6f8}header{background:#1f4e78;color:#fff;padding:16px 22px}main{padding:16px}.layout{display:grid;grid-template-columns:320px 1fr;gap:14px}.panel{background:#fff;border:1px solid #ddd;border-radius:8px;padding:14px}.list{max-height:70vh;overflow:auto;border:1px solid #ddd}.item{padding:10px;border-bottom:1px solid #eee;cursor:pointer}.item:hover,.item.active{background:#eaf2fb}.grid{display:grid;grid-template-columns:repeat(2,minmax(180px,1fr));gap:10px}label{display:flex;flex-direction:column;gap:4px;font-size:13px}input,textarea,button{padding:8px;border:1px solid #bbb;border-radius:4px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}button{cursor:pointer}.primary{background:#1f4e78;color:#fff}table{border-collapse:collapse;width:100%;font-size:13px}th,td{border:1px solid #ddd;padding:7px}th{background:#eef3f8}@media(max-width:900px){.layout{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}</style></head><body><header><h1>TLC Code Master</h1><div>One Screen：左侧分类，右侧代码值</div></header><main><div class="layout"><section class="panel"><div class="toolbar"><button class="primary" onclick="newCategory()">新增分类</button><button onclick="saveCategory()">保存分类</button></div><div id="categoryList" class="list"></div></section><section class="panel"><h2 id="title">请选择分类</h2><div class="grid"><label>Category Code<input id="catCode"></label><label>排序<input id="catSort" type="number" value="0"></label><label>中文<input id="catZh"></label><label>日文<input id="catJa"></label><label>英文<input id="catEn"></label><label>启用<input id="catActive" type="checkbox" checked></label><label style="grid-column:1/-1">说明<textarea id="catDesc"></textarea></label></div><input id="catId" type="hidden"><hr><div class="toolbar"><button class="primary" onclick="newValue()">新增代码值</button><button onclick="saveValue()">保存代码值</button></div><div class="grid"><label>Code<input id="valCode"></label><label>排序<input id="valSort" type="number" value="0"></label><label>中文<input id="valZh"></label><label>日文<input id="valJa"></label><label>英文<input id="valEn"></label><label>启用<input id="valActive" type="checkbox" checked></label><label style="grid-column:1/-1">Extra JSON<textarea id="valExtra">{}</textarea></label></div><input id="valId" type="hidden"><table><thead><tr><th>Code</th><th>中文</th><th>日文</th><th>英文</th><th>排序</th><th>状态</th></tr></thead><tbody id="valueBody"></tbody></table></section></div></main><script>let cats=[],vals=[],current='';async function api(u,o){const r=await fetch(u,o);const b=await r.json();if(!r.ok)throw new Error(b.detail||JSON.stringify(b));return b}async function loadCats(){cats=await api('/api/tlc-codes/categories');const e=document.getElementById('categoryList');e.innerHTML='';cats.forEach(c=>{const d=document.createElement('div');d.className='item'+(c.category_code===current?' active':'');d.innerHTML='<strong>'+c.category_code+'</strong><br>'+(c.name_zh||c.name_ja||c.name_en||'');d.onclick=()=>selectCat(c);d.ondblclick=()=>{selectCat(c);document.getElementById('valCode').focus()};e.appendChild(d)})}function selectCat(c){current=c.category_code;title.textContent=c.category_code+' / '+(c.name_zh||c.name_ja||c.name_en||'');catId.value=c.id;catCode.value=c.category_code;catZh.value=c.name_zh||'';catJa.value=c.name_ja||'';catEn.value=c.name_en||'';catSort.value=c.sort_order||0;catActive.checked=!!c.active;catDesc.value=c.description||'';loadVals();loadCats()}function newCategory(){current='';['catId','catCode','catZh','catJa','catEn','catDesc'].forEach(i=>document.getElementById(i).value='');catSort.value=0;catActive.checked=true;title.textContent='新分类';newValue()}async function saveCategory(){try{const p={id:catId.value,category_code:catCode.value,name_zh:catZh.value,name_ja:catJa.value,name_en:catEn.value,sort_order:Number(catSort.value||0),active:catActive.checked,description:catDesc.value};const s=await api('/api/tlc-codes/categories',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});current=s.category_code;await loadCats();selectCat(s)}catch(e){alert(e.message)}}async function loadVals(){if(!current){vals=[];renderVals();return}vals=await api('/api/tlc-codes/values?category_code='+encodeURIComponent(current));renderVals()}function renderVals(){valueBody.innerHTML='';vals.forEach(v=>{const tr=document.createElement('tr');tr.innerHTML='<td>'+v.code+'</td><td>'+v.name_zh+'</td><td>'+v.name_ja+'</td><td>'+v.name_en+'</td><td>'+v.sort_order+'</td><td>'+(v.active?'启用':'停用')+'</td>';tr.ondblclick=()=>selectVal(v);valueBody.appendChild(tr)})}function selectVal(v){valId.value=v.id;valCode.value=v.code;valZh.value=v.name_zh||'';valJa.value=v.name_ja||'';valEn.value=v.name_en||'';valSort.value=v.sort_order||0;valActive.checked=!!v.active;valExtra.value=JSON.stringify(v.extra_json||{},null,2)}function newValue(){['valId','valCode','valZh','valJa','valEn'].forEach(i=>document.getElementById(i).value='');valSort.value=0;valActive.checked=true;valExtra.value='{}'}async function saveValue(){if(!current){alert('请先选择分类');return}let x={};try{x=JSON.parse(valExtra.value||'{}')}catch(e){alert('Extra JSON格式错误');return}try{await api('/api/tlc-codes/values',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:valId.value,category_code:current,code:valCode.value,name_zh:valZh.value,name_ja:valJa.value,name_en:valEn.value,sort_order:Number(valSort.value||0),active:valActive.checked,extra_json:x})});await loadVals();newValue()}catch(e){alert(e.message)}}loadCats().catch(e=>alert(e.message));</script></body></html>
